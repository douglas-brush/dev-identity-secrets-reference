# Allow Vault Access — Network Policy
# Permits pods with the vault-client label to reach Vault on port 8200.
# Apply to namespaces that need direct Vault access (not needed if using
# External Secrets Operator or CSI Driver — those have their own policies).
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vault-access
  namespace: my-app
  labels:
    app.kubernetes.io/name: allow-vault-access
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: platform-security
    app.kubernetes.io/managed-by: platform-team
  annotations:
    platform.example.com/description: "Allow labeled pods to reach Vault"
    platform.example.com/policy-type: "allow"
spec:
  # Only pods explicitly labeled as Vault clients
  podSelector:
    matchLabels:
      vault.hashicorp.com/client: "true"
  policyTypes:
    - Egress
  egress:
    # Vault running in-cluster
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
          podSelector:
            matchLabels:
              app.kubernetes.io/name: vault
      ports:
        - protocol: TCP
          port: 8200
        - protocol: TCP
          port: 8201  # Vault cluster port (HA replication)
    # Vault running externally — use CIDR if Vault is outside the cluster
    # - to:
    #     - ipBlock:
    #         cidr: 10.0.1.0/24
    #   ports:
    #     - protocol: TCP
    #       port: 8200
