# SPIRE Agent — DaemonSet
# Runs on every node and provides workload attestation + SVID issuance.
# Connects to SPIRE Server and exposes the Workload API via a Unix domain socket.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-agent
  namespace: spire
  labels:
    app.kubernetes.io/name: spire-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: spiffe
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spire-agent
  labels:
    app.kubernetes.io/name: spire-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: spiffe
rules:
  # Required for workload attestation — look up pod info
  - apiGroups: [""]
    resources: ["pods", "nodes", "nodes/proxy"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spire-agent
  labels:
    app.kubernetes.io/name: spire-agent
    app.kubernetes.io/part-of: spiffe
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: spire-agent
subjects:
  - kind: ServiceAccount
    name: spire-agent
    namespace: spire
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-agent-config
  namespace: spire
  labels:
    app.kubernetes.io/name: spire-agent
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: spiffe
data:
  agent.conf: |
    agent {
      data_dir = "/run/spire"
      log_level = "INFO"
      server_address = "spire-server.spire.svc.cluster.local"
      server_port = "8081"
      socket_path = "/run/spire/sockets/agent.sock"
      trust_bundle_path = "/run/spire/bundle/bundle.crt"
      trust_domain = "example.com"
    }

    plugins {
      NodeAttestor "k8s_psat" {
        plugin_data {
          cluster = "my-cluster"
        }
      }

      KeyManager "memory" {
        plugin_data {}
      }

      WorkloadAttestor "k8s" {
        plugin_data {
          skip_kubelet_verification = false
        }
      }
    }

    health_checks {
      listener_enabled = true
      bind_address = "0.0.0.0"
      bind_port = "8080"
      live_path = "/live"
      ready_path = "/ready"
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: spire-agent
  namespace: spire
  labels:
    app.kubernetes.io/name: spire-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: spiffe
    app.kubernetes.io/managed-by: platform-team
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: spire-agent
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spire-agent
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: spire-agent
      # hostPID required for workload attestation (mapping socket caller to pod)
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      securityContext:
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        # Wait for the trust bundle to be available
        - name: init-bundle
          image: ghcr.io/spiffe/spire-agent:1.9.6
          command: ["sh", "-c"]
          args:
            - |
              while [ ! -f /run/spire/bundle/bundle.crt ]; do
                echo "Waiting for trust bundle..."
                sleep 2
              done
          volumeMounts:
            - name: spire-bundle
              mountPath: /run/spire/bundle
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi

      containers:
        - name: spire-agent
          image: ghcr.io/spiffe/spire-agent:1.9.6
          args:
            - "-config"
            - "/run/spire/config/agent.conf"
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
          securityContext:
            # Agent needs elevated privileges for workload attestation
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - SYS_PTRACE   # Required for PID-based workload attestation
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /run/spire/config
              readOnly: true
            - name: spire-bundle
              mountPath: /run/spire/bundle
            - name: spire-sockets
              mountPath: /run/spire/sockets
          livenessProbe:
            httpGet:
              path: /live
              port: health
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: config
          configMap:
            name: spire-agent-config
        - name: spire-bundle
          configMap:
            name: spire-bundle
        - name: spire-sockets
          hostPath:
            path: /run/spire/sockets
            type: DirectoryOrCreate
