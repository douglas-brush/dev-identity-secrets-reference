# =============================================================================
# SPIRE Agent -- Reference Example
# =============================================================================
# NOT PRODUCTION-READY. Contains placeholder values that must be replaced.
#
# This manifest deploys:
#   - ServiceAccount + ClusterRole + ClusterRoleBinding
#   - ConfigMap with agent configuration
#   - DaemonSet (runs on every node)
#
# Prerequisites:
#   - SPIRE Server deployed and healthy
#   - spire-bundle ConfigMap populated by the server's k8sbundle notifier
#
# Before deploying, replace:
#   - trust_domain = "example.com"  --> must match SPIRE Server trust domain
#   - cluster = "my-cluster"        --> must match SPIRE Server cluster name
#
# See README.md for full deployment order and production checklist.
# =============================================================================
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-agent
  namespace: spire
  labels:
    app.kubernetes.io/name: spire-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: spiffe
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spire-agent
  labels:
    app.kubernetes.io/name: spire-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: spiffe
rules:
  # Required for k8s workload attestation -- the agent looks up pod metadata
  # to determine the identity of workloads connecting to the Workload API.
  - apiGroups: [""]
    resources: ["pods", "nodes", "nodes/proxy"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spire-agent
  labels:
    app.kubernetes.io/name: spire-agent
    app.kubernetes.io/part-of: spiffe
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: spire-agent
subjects:
  - kind: ServiceAccount
    name: spire-agent
    namespace: spire
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-agent-config
  namespace: spire
  labels:
    app.kubernetes.io/name: spire-agent
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: spiffe
data:
  agent.conf: |
    agent {
      data_dir = "/run/spire"
      log_level = "INFO"

      # SPIRE Server address -- agents connect here for node attestation
      # and SVID issuance. Uses the in-cluster Service DNS name.
      server_address = "spire-server.spire.svc.cluster.local"
      server_port = "8081"

      # Unix domain socket path where the Workload API is exposed.
      # The CSI driver or hostPath mount makes this available to workload pods.
      socket_path = "/run/spire/sockets/agent.sock"

      # Initial trust bundle for bootstrapping trust with the SPIRE Server.
      # Mounted from the spire-bundle ConfigMap (populated by the server).
      trust_bundle_path = "/run/spire/bundle/bundle.crt"

      # CHANGE: Must match the trust_domain in the SPIRE Server configuration.
      trust_domain = "example.com"
    }

    plugins {
      # Node attestation via Kubernetes Projected Service Account Tokens.
      # CHANGE: Must match the cluster name in the SPIRE Server configuration.
      NodeAttestor "k8s_psat" {
        plugin_data {
          cluster = "my-cluster"
        }
      }

      # In-memory key manager -- agent keys do not need to persist across
      # restarts since the agent re-attests on startup.
      KeyManager "memory" {
        plugin_data {}
      }

      # Kubernetes workload attestor -- identifies connecting workloads by
      # querying the kubelet for pod metadata (namespace, service account,
      # labels, etc.).
      WorkloadAttestor "k8s" {
        plugin_data {
          # Set to false in production. When true, the agent skips TLS
          # verification of the kubelet, which weakens attestation security.
          skip_kubelet_verification = false
        }
      }
    }

    health_checks {
      listener_enabled = true
      bind_address = "0.0.0.0"
      bind_port = "8080"
      live_path = "/live"
      ready_path = "/ready"
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: spire-agent
  namespace: spire
  labels:
    app.kubernetes.io/name: spire-agent
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: spiffe
    app.kubernetes.io/managed-by: platform-team
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: spire-agent
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spire-agent
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: spire-agent

      # hostPID: required for PID-based workload attestation -- the agent
      # maps the PID of the workload connecting to the Unix socket back to
      # a Kubernetes pod via the kubelet API.
      hostPID: true

      # hostNetwork: required so the agent can reach the kubelet directly
      # for workload attestation without going through kube-proxy.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      securityContext:
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        # Block agent startup until the trust bundle is available.
        # The spire-bundle ConfigMap is populated by the SPIRE Server's
        # k8sbundle notifier plugin after the server starts.
        - name: init-bundle
          image: ghcr.io/spiffe/spire-agent:1.9.6
          command: ["sh", "-c"]
          args:
            - |
              while [ ! -f /run/spire/bundle/bundle.crt ]; do
                echo "Waiting for trust bundle..."
                sleep 2
              done
          volumeMounts:
            - name: spire-bundle
              mountPath: /run/spire/bundle
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi

      containers:
        - name: spire-agent
          # CHANGE: Pin to your tested version. Must match SPIRE Server version.
          image: ghcr.io/spiffe/spire-agent:1.9.6
          args:
            - "-config"
            - "/run/spire/config/agent.conf"
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
          securityContext:
            # Agent runs as root for PID-based workload attestation.
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                # SYS_PTRACE: required for the agent to inspect the PID of
                # workloads connecting to the Workload API Unix socket and
                # map them back to Kubernetes pods.
                - SYS_PTRACE
          # CHANGE: Right-size based on node workload density.
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /run/spire/config
              readOnly: true
            - name: spire-bundle
              mountPath: /run/spire/bundle
            - name: spire-sockets
              mountPath: /run/spire/sockets
          livenessProbe:
            httpGet:
              path: /live
              port: health
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: config
          configMap:
            name: spire-agent-config
        # Trust bundle -- mounted from the ConfigMap populated by the server.
        - name: spire-bundle
          configMap:
            name: spire-bundle
        # Workload API socket directory -- shared with the CSI driver or
        # directly with workload pods via hostPath.
        - name: spire-sockets
          hostPath:
            path: /run/spire/sockets
            type: DirectoryOrCreate
