# =============================================================================
# ClusterSPIFFEID -- Reference Examples
# =============================================================================
# NOT PRODUCTION-READY. These are example workload identity registrations
# that demonstrate ClusterSPIFFEID patterns. Replace with your actual
# workload identities.
#
# ClusterSPIFFEID is a cluster-scoped CRD managed by SPIRE Controller Manager.
# When a pod matches the selector, SPIRE automatically issues an X.509 SVID
# with the templated SPIFFE ID. No manual registration entry management needed.
#
# Prerequisites:
#   - SPIRE Server and Agent deployed
#   - SPIRE Controller Manager deployed (manages these CRDs)
#   - SPIRE CRDs installed (ClusterSPIFFEID, ClusterFederatedTrustDomain)
#   - Target namespaces labeled with spiffe.io/workload-identity: "true"
#
# SPIFFE ID conventions shown here:
#   spiffe://<trust-domain>/ns/<namespace>/sa/<service-account>
#   This is the most common pattern -- it maps identity to namespace and
#   service account, which aligns with Kubernetes RBAC boundaries.
# =============================================================================
---
# Example: Backend service identity
# Matches pods with app.kubernetes.io/name=my-app, component=backend
# in namespaces labeled with spiffe.io/workload-identity=true
apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterSPIFFEID
metadata:
  name: my-app-backend
  labels:
    app.kubernetes.io/name: my-app-backend
    app.kubernetes.io/component: identity
    app.kubernetes.io/part-of: spiffe
    app.kubernetes.io/managed-by: platform-team
  annotations:
    # CHANGE: Replace with your organization's annotation conventions
    platform.example.com/owner: "team-backend"
    platform.example.com/description: "SPIFFE identity for my-app backend workloads"
spec:
  # SPIFFE ID template -- uses pod metadata for unique identity.
  # Result example: spiffe://example.com/ns/my-app/sa/my-app-backend
  #
  # Available template variables:
  #   .TrustDomain              -- the SPIRE Server's trust domain
  #   .PodMeta.Namespace        -- pod namespace
  #   .PodMeta.Name             -- pod name
  #   .PodSpec.ServiceAccountName -- pod service account
  #   .PodSpec.NodeName         -- node the pod runs on
  spiffeIDTemplate: "spiffe://{{ .TrustDomain }}/ns/{{ .PodMeta.Namespace }}/sa/{{ .PodSpec.ServiceAccountName }}"

  # Pod selector -- which pods receive this SPIFFE ID.
  # CHANGE: Replace with labels matching your actual workloads.
  podSelector:
    matchLabels:
      app.kubernetes.io/name: my-app
      app.kubernetes.io/component: backend

  # Namespace selector -- restricts which namespaces this applies to.
  # Only namespaces with this label will have pods matched.
  # This prevents accidental identity issuance to unrelated namespaces.
  namespaceSelector:
    matchLabels:
      spiffe.io/workload-identity: "true"

  # X.509 SVID TTL -- how long the workload certificate is valid.
  # Shorter is more secure but increases rotation frequency.
  # Must not exceed the server's ca_ttl.
  x509SVIDTTL: "4h"

  # JWT SVID TTL -- for workloads that also need JWT-based identity
  # (e.g., authenticating to external services that accept JWT-SVIDs).
  jwtSVIDTTL: "30m"

  # DNS SANs to include in the X.509 SVID. Required if the workload
  # serves TLS and clients validate the hostname.
  # CHANGE: Replace with your actual service DNS names.
  dnsNameTemplates:
    - "{{ .PodMeta.Name }}.my-app.{{ .PodMeta.Namespace }}.svc.cluster.local"
    - "my-app.{{ .PodMeta.Namespace }}.svc.cluster.local"

  # Downstream -- enable if this identity acts as an intermediate SPIRE
  # server in a nested SPIRE topology. Uncommon in single-cluster setups.
  # downstream: true

  # Federation -- list trust domains this workload can authenticate with.
  # Requires federation configured on the SPIRE Server and
  # ClusterFederatedTrustDomain resources created.
  # federatesWith:
  #   - "partner.example.org"
---
# Example: Frontend service identity
# Demonstrates a second workload with different selectors.
# CHANGE: Replace with your actual frontend workload labels.
apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterSPIFFEID
metadata:
  name: my-app-frontend
  labels:
    app.kubernetes.io/name: my-app-frontend
    app.kubernetes.io/component: identity
    app.kubernetes.io/part-of: spiffe
    app.kubernetes.io/managed-by: platform-team
  annotations:
    platform.example.com/owner: "team-frontend"
    platform.example.com/description: "SPIFFE identity for my-app frontend workloads"
spec:
  spiffeIDTemplate: "spiffe://{{ .TrustDomain }}/ns/{{ .PodMeta.Namespace }}/sa/{{ .PodSpec.ServiceAccountName }}"
  podSelector:
    matchLabels:
      app.kubernetes.io/name: my-app
      app.kubernetes.io/component: frontend
  namespaceSelector:
    matchLabels:
      spiffe.io/workload-identity: "true"
  x509SVIDTTL: "4h"
  dnsNameTemplates:
    - "{{ .PodMeta.Name }}.my-app-frontend.{{ .PodMeta.Namespace }}.svc.cluster.local"
