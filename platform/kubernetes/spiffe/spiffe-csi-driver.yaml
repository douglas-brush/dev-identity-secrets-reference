# =============================================================================
# SPIFFE CSI Driver -- Reference Example
# =============================================================================
# Provides a CSI ephemeral volume that exposes the SPIRE Workload API socket
# to workload pods. This is the recommended method for workloads to obtain
# SVIDs -- it avoids mounting hostPath volumes directly in application pods.
#
# This manifest deploys:
#   - ServiceAccount
#   - CSIDriver registration
#   - DaemonSet (CSI driver + node-driver-registrar sidecar)
#
# Prerequisites:
#   - SPIRE Agent running on each node (spire-agent.yaml)
#   - Agent socket available at /run/spire/sockets/agent.sock on each node
#
# This manifest is generally usable as-is. The only values to review are
# the image tags and resource limits.
# =============================================================================
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spiffe-csi-driver
  namespace: spire
  labels:
    app.kubernetes.io/name: spiffe-csi-driver
    app.kubernetes.io/component: csi-driver
    app.kubernetes.io/part-of: spiffe
---
apiVersion: storage.k8s.io/v1
kind: CSIDriver
metadata:
  name: csi.spiffe.io
  labels:
    app.kubernetes.io/name: spiffe-csi-driver
    app.kubernetes.io/component: csi-driver
    app.kubernetes.io/part-of: spiffe
spec:
  # Ephemeral volumes only -- no persistent volume support needed.
  # Workloads request the volume inline in their pod spec.
  volumeLifecycleModes:
    - Ephemeral
  # Pod info is not passed to the driver; SPIRE Agent handles attestation
  # independently via the Workload API socket caller's PID.
  podInfoOnMount: false
  # No filesystem group policy needed -- the socket permissions are managed
  # by the SPIRE Agent.
  fsGroupPolicy: None
  # No attach step needed for ephemeral inline volumes.
  attachRequired: false
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: spiffe-csi-driver
  namespace: spire
  labels:
    app.kubernetes.io/name: spiffe-csi-driver
    app.kubernetes.io/component: csi-driver
    app.kubernetes.io/part-of: spiffe
    app.kubernetes.io/managed-by: platform-team
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: spiffe-csi-driver
      app.kubernetes.io/component: csi-driver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spiffe-csi-driver
        app.kubernetes.io/component: csi-driver
    spec:
      serviceAccountName: spiffe-csi-driver

      containers:
        - name: spiffe-csi-driver
          # CHANGE: Pin to your tested version.
          image: ghcr.io/spiffe/spiffe-csi-driver:0.2.6
          args:
            - "-workload-api-socket-dir"
            - "/spire-agent-socket"
            - "-csi-socket-path"
            - "/spiffe-csi/csi.sock"
          securityContext:
            # CSI driver requires privileged to create and manage volumes
            # on behalf of kubelet. This is inherent to CSI node plugins.
            privileged: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            # SPIRE Agent workload API socket directory
            - name: spire-agent-socket
              mountPath: /spire-agent-socket
              readOnly: true
            # CSI driver socket -- kubelet communicates with the driver here
            - name: spiffe-csi-socket
              mountPath: /spiffe-csi
            # Pod volume mount point -- Bidirectional propagation allows the
            # driver to expose the SPIRE socket into workload pod volumes
            - name: mountpoint-dir
              mountPath: /var/lib/kubelet/pods
              mountPropagation: Bidirectional

        # CSI node driver registrar -- registers the CSI driver with kubelet
        # so that pods can request csi.spiffe.io volumes.
        - name: node-driver-registrar
          image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.10.1
          args:
            - "-csi-address"
            - "/spiffe-csi/csi.sock"
            - "-kubelet-registration-path"
            - "/var/lib/kubelet/plugins/csi.spiffe.io/csi.sock"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: spiffe-csi-socket
              mountPath: /spiffe-csi
            - name: registration-dir
              mountPath: /registration

      volumes:
        # SPIRE Agent socket directory on the host
        - name: spire-agent-socket
          hostPath:
            path: /run/spire/sockets
            type: DirectoryOrCreate
        # CSI driver plugin directory
        - name: spiffe-csi-socket
          hostPath:
            path: /var/lib/kubelet/plugins/csi.spiffe.io
            type: DirectoryOrCreate
        # Pod volumes directory -- used for mount propagation
        - name: mountpoint-dir
          hostPath:
            path: /var/lib/kubelet/pods
            type: Directory
        # Kubelet plugin registration directory
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry
            type: Directory
