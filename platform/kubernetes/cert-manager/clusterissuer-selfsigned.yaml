# ClusterIssuer — Self-Signed (Dev/Testing Only)
# Issues self-signed certificates for development and testing environments.
# NOT for production use — certificates are not trusted by external clients.
# Use this to bootstrap a CA issuer or for internal dev clusters.
---
# Root self-signed issuer — used to create a CA certificate
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-root
  labels:
    app.kubernetes.io/name: selfsigned-root
    app.kubernetes.io/component: issuer
    app.kubernetes.io/part-of: cert-manager
    app.kubernetes.io/managed-by: platform-team
  annotations:
    platform.example.com/description: "Self-signed root issuer for bootstrapping dev CA"
    platform.example.com/environment: "development"
spec:
  selfSigned: {}
---
# CA certificate — issued by the self-signed root, used to sign workload certs
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: dev-ca
  namespace: cert-manager
  labels:
    app.kubernetes.io/name: dev-ca
    app.kubernetes.io/component: ca-certificate
    app.kubernetes.io/part-of: cert-manager
spec:
  isCA: true
  commonName: "Dev Cluster CA"
  duration: 8760h    # 1 year
  renewBefore: 720h  # 30 days
  secretName: dev-ca-key-pair
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-root
    kind: ClusterIssuer
    group: cert-manager.io
---
# CA issuer — uses the CA certificate to sign workload certificates
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: dev-ca-issuer
  labels:
    app.kubernetes.io/name: dev-ca-issuer
    app.kubernetes.io/component: issuer
    app.kubernetes.io/part-of: cert-manager
    app.kubernetes.io/managed-by: platform-team
  annotations:
    platform.example.com/description: "Dev CA issuer for internal workload certificates"
    platform.example.com/environment: "development"
spec:
  ca:
    secretName: dev-ca-key-pair
