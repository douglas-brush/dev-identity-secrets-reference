# Certificate — Complete Example with Rotation Policy
# Demonstrates: proper duration/renewBefore, multiple DNS names, private key config,
# usage fields, and annotations for operational visibility.
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: my-app-tls
  namespace: my-app
  labels:
    app.kubernetes.io/name: my-app
    app.kubernetes.io/component: tls-certificate
    app.kubernetes.io/part-of: my-app
    app.kubernetes.io/managed-by: cert-manager
  annotations:
    platform.example.com/owner: "team-backend"
    platform.example.com/description: "TLS certificate for my-app ingress and internal mTLS"
spec:
  # Certificate validity and rotation
  duration: 2160h     # 90 days
  renewBefore: 360h   # 15 days — renew well before expiry
  # Rotate the private key on each renewal for forward secrecy
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always

  # Subject — keep it minimal; SANs are what matter
  commonName: my-app.example.com

  # DNS names this certificate is valid for
  dnsNames:
    - my-app.example.com
    - my-app.my-app.svc.cluster.local
    - my-app.my-app.svc

  # IP SANs (if needed for direct IP access)
  # ipAddresses:
  #   - 10.0.0.1

  # Key usages
  usages:
    - server auth
    - client auth

  # Store the certificate and key in this Secret
  secretName: my-app-tls
  secretTemplate:
    labels:
      app.kubernetes.io/name: my-app
      app.kubernetes.io/component: tls
    annotations:
      platform.example.com/auto-rotated: "true"

  # Which issuer to use
  issuerRef:
    name: vault-pki
    kind: ClusterIssuer
    group: cert-manager.io

  # Additional output formats (for apps that need JKS or PKCS12)
  # additionalOutputFormats:
  #   - type: CombinedPEM
  #   - type: DER
