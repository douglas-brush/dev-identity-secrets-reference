# ClusterIssuer — Let's Encrypt (Staging + Production)
# Issues publicly-trusted certificates via ACME protocol.
# Uses DNS-01 challenge solver for wildcard support.
# Requires: cert-manager v1.12+, DNS provider credentials configured.
---
# Staging issuer — use this for testing to avoid rate limits
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    app.kubernetes.io/name: letsencrypt-staging
    app.kubernetes.io/component: issuer
    app.kubernetes.io/part-of: cert-manager
    app.kubernetes.io/managed-by: platform-team
  annotations:
    platform.example.com/description: "Let's Encrypt staging issuer for testing"
    platform.example.com/environment: "staging"
spec:
  acme:
    # Let's Encrypt staging endpoint
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: platform-team@example.com
    # Store the ACME account key in a Secret
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      # DNS-01 solver — supports wildcard certificates
      - dns01:
          route53:
            region: us-east-1
            # Use IRSA for AWS auth — no static credentials
            auth:
              kubernetes:
                serviceAccountRef:
                  name: cert-manager
        selector:
          dnsZones:
            - "example.com"
      # HTTP-01 solver — fallback for non-wildcard certs
      - http01:
          ingress:
            ingressClassName: nginx
        selector:
          dnsZones:
            - "example.com"
---
# Production issuer — use this for real certificates
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app.kubernetes.io/name: letsencrypt-prod
    app.kubernetes.io/component: issuer
    app.kubernetes.io/part-of: cert-manager
    app.kubernetes.io/managed-by: platform-team
  annotations:
    platform.example.com/description: "Let's Encrypt production issuer"
    platform.example.com/environment: "production"
spec:
  acme:
    # Let's Encrypt production endpoint
    server: https://acme-v02.api.letsencrypt.org/directory
    email: platform-team@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          route53:
            region: us-east-1
            auth:
              kubernetes:
                serviceAccountRef:
                  name: cert-manager
        selector:
          dnsZones:
            - "example.com"
      - http01:
          ingress:
            ingressClassName: nginx
        selector:
          dnsZones:
            - "example.com"
