# ClusterIssuer — Vault PKI Backend
# Issues certificates via Vault's PKI secrets engine.
# Auth: Kubernetes ServiceAccount token validated by Vault.
# Requires: cert-manager v1.12+, Vault PKI secrets engine configured.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vault-pki
  labels:
    app.kubernetes.io/name: vault-pki
    app.kubernetes.io/component: issuer
    app.kubernetes.io/part-of: cert-manager
    app.kubernetes.io/managed-by: platform-team
  annotations:
    platform.example.com/description: "Vault PKI issuer for internal certificates"
    platform.example.com/owner: "team-platform"
spec:
  vault:
    # Vault server address
    server: "https://vault.example.com"
    # PKI sign endpoint — issues certificates against an intermediate CA
    path: "pki_int/sign/internal-certs"
    # CA bundle for TLS to Vault
    caBundle: ""  # Base64-encoded CA cert, or use caBundleSecretRef below
    # Kubernetes auth — no static tokens
    auth:
      kubernetes:
        # Vault auth backend mount path
        mountPath: "/v1/auth/kubernetes"
        role: "cert-manager"
        # ServiceAccount used by cert-manager
        serviceAccountRef:
          name: "cert-manager"
