# Pod with cert-manager CSI Driver — Ephemeral Certificates
# The cert-manager CSI driver provisions unique certificates per pod, injected
# directly into the pod filesystem. Certificates are ephemeral — they exist only
# for the pod's lifetime and are automatically cleaned up.
# Requires: cert-manager v1.12+, cert-manager-csi-driver installed.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-mtls
  namespace: my-app
  labels:
    app.kubernetes.io/name: my-app-mtls
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: my-app
    app.kubernetes.io/managed-by: platform-team
  annotations:
    platform.example.com/owner: "team-backend"
    platform.example.com/cert-source: "csi-ephemeral"
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: my-app-mtls
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: my-app-mtls
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: my-app
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: app
          image: my-app:latest
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          env:
            - name: TLS_CERT_PATH
              value: /certs/tls.crt
            - name: TLS_KEY_PATH
              value: /certs/tls.key
            - name: TLS_CA_PATH
              value: /certs/ca.crt

          volumeMounts:
            # Ephemeral cert from cert-manager CSI driver
            - name: certs
              mountPath: /certs
              readOnly: true
            - name: tmp
              mountPath: /tmp

          livenessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        # cert-manager CSI driver — provisions a unique cert per pod
        - name: certs
          csi:
            driver: csi.cert-manager.io
            readOnly: true
            volumeAttributes:
              # Issuer to use for this certificate
              csi.cert-manager.io/issuer-name: vault-pki
              csi.cert-manager.io/issuer-kind: ClusterIssuer
              csi.cert-manager.io/issuer-group: cert-manager.io
              # Certificate DNS names — use pod identity
              csi.cert-manager.io/dns-names: "${POD_NAME}.my-app.my-app.svc.cluster.local"
              # Certificate duration and renewal
              csi.cert-manager.io/duration: "24h"
              csi.cert-manager.io/renew-before: "4h"
              # Private key configuration
              csi.cert-manager.io/key-algorithm: "ECDSA"
              csi.cert-manager.io/key-size: "256"
              # Output file names
              csi.cert-manager.io/certificate-file: "tls.crt"
              csi.cert-manager.io/privatekey-file: "tls.key"
              csi.cert-manager.io/ca-file: "ca.crt"
              # Key usages
              csi.cert-manager.io/key-usages: "server auth,client auth"
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
