# SecretProviderClass — Vault Provider
# Mounts Vault secrets directly into pod filesystems via the Secrets Store CSI Driver.
# Auth: Kubernetes ServiceAccount token validated by Vault.
# Requires: Secrets Store CSI Driver + Vault Provider installed.
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: vault-app-secrets
  namespace: my-app
  labels:
    app.kubernetes.io/name: my-app
    app.kubernetes.io/component: secret-provider
    app.kubernetes.io/part-of: secrets-store-csi
    app.kubernetes.io/managed-by: platform-team
  annotations:
    platform.example.com/description: "Vault CSI provider for application secrets"
    platform.example.com/owner: "team-backend"
spec:
  provider: vault
  parameters:
    # Vault server address
    vaultAddress: "https://vault.example.com"
    # Vault Kubernetes auth backend
    roleName: "my-app"
    # TLS CA cert for Vault — mounted from a ConfigMap
    vaultCACertPath: "/vault/tls/ca.crt"

    # Multiple secret objects to mount as files
    objects: |
      - objectName: "db-password"
        secretPath: "secret/data/my-app/database"
        secretKey: "password"
      - objectName: "db-username"
        secretPath: "secret/data/my-app/database"
        secretKey: "username"
      - objectName: "api-key"
        secretPath: "secret/data/my-app/api"
        secretKey: "key"
      - objectName: "tls-cert"
        secretPath: "secret/data/my-app/tls"
        secretKey: "certificate"
      - objectName: "tls-key"
        secretPath: "secret/data/my-app/tls"
        secretKey: "private_key"

  # Optional: sync CSI-mounted secrets to a Kubernetes Secret
  # Useful when apps need env vars instead of file mounts
  secretObjects:
    - secretName: app-secrets-synced
      type: Opaque
      labels:
        app.kubernetes.io/name: my-app
        app.kubernetes.io/component: secrets
      data:
        - objectName: db-password
          key: DATABASE_PASSWORD
        - objectName: db-username
          key: DATABASE_USERNAME
        - objectName: api-key
          key: API_KEY
    - secretName: app-tls
      type: kubernetes.io/tls
      labels:
        app.kubernetes.io/name: my-app
        app.kubernetes.io/component: tls
      data:
        - objectName: tls-cert
          key: tls.crt
        - objectName: tls-key
          key: tls.key
