# SecretProviderClass — AWS Secrets Manager Provider
# Mounts AWS Secrets Manager secrets into pod filesystems via CSI Driver.
# Auth: IRSA (IAM Roles for Service Accounts) — no static credentials.
# Requires: Secrets Store CSI Driver + AWS Provider installed on EKS.
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: aws-app-secrets
  namespace: my-app
  labels:
    app.kubernetes.io/name: my-app
    app.kubernetes.io/component: secret-provider
    app.kubernetes.io/part-of: secrets-store-csi
    app.kubernetes.io/managed-by: platform-team
  annotations:
    platform.example.com/description: "AWS Secrets Manager CSI provider for application secrets"
    platform.example.com/owner: "team-backend"
spec:
  provider: aws
  parameters:
    # Multiple secret objects from AWS Secrets Manager
    objects: |
      - objectName: "arn:aws:secretsmanager:us-east-1:111122223333:secret:my-app/database"
        objectType: "secretsmanager"
        objectAlias: "db-credentials"
        jmesPath:
          - path: "username"
            objectAlias: "db-username"
          - path: "password"
            objectAlias: "db-password"
      - objectName: "arn:aws:secretsmanager:us-east-1:111122223333:secret:my-app/api-key"
        objectType: "secretsmanager"
        objectAlias: "api-key"
      - objectName: "arn:aws:ssm:us-east-1:111122223333:parameter/my-app/config/feature-flag"
        objectType: "ssmparameter"
        objectAlias: "feature-flag"

  # Sync to Kubernetes Secret for env var consumption
  secretObjects:
    - secretName: aws-app-secrets-synced
      type: Opaque
      labels:
        app.kubernetes.io/name: my-app
        app.kubernetes.io/component: secrets
      data:
        - objectName: db-username
          key: DATABASE_USERNAME
        - objectName: db-password
          key: DATABASE_PASSWORD
        - objectName: api-key
          key: API_KEY
        - objectName: feature-flag
          key: FEATURE_FLAG
