# Pod with Secrets Store CSI Volume Mount — Complete Example
# Demonstrates: CSI secret volume, proper security context, resource limits,
# read-only root filesystem, and non-root execution.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: my-app
  namespace: my-app
  labels:
    app.kubernetes.io/name: my-app
    app.kubernetes.io/component: workload
  annotations:
    # For AWS IRSA (EKS)
    # eks.amazonaws.com/role-arn: "arn:aws:iam::111122223333:role/my-app-secrets-role"
    # For GCP Workload Identity (GKE)
    # iam.gke.io/gcp-service-account: "my-app@my-project.iam.gserviceaccount.com"
    platform.example.com/owner: "team-backend"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  namespace: my-app
  labels:
    app.kubernetes.io/name: my-app
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: my-app
    app.kubernetes.io/managed-by: platform-team
  annotations:
    platform.example.com/owner: "team-backend"
    platform.example.com/secret-provider: "csi"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: my-app
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: my-app
        app.kubernetes.io/component: server
    spec:
      # Use a dedicated service account — never default
      serviceAccountName: my-app
      automountServiceAccountToken: true

      # Security best practices
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: app
          image: my-app:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          # Hardened container security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          # Read secrets from mounted files
          env:
            - name: DATABASE_PASSWORD_FILE
              value: "/secrets/db-password"
            - name: API_KEY_FILE
              value: "/secrets/api-key"
          # Or use synced Kubernetes Secret as env vars
          envFrom:
            - secretRef:
                name: app-secrets-synced

          volumeMounts:
            # CSI-mounted secrets — read-only
            - name: secrets
              mountPath: /secrets
              readOnly: true
            # Writable tmp for the read-only root filesystem
            - name: tmp
              mountPath: /tmp

          # Health checks
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        # Secrets Store CSI Driver volume
        - name: secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: vault-app-secrets
        # emptyDir for tmp (read-only root filesystem requires this)
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
