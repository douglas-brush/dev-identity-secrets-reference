# ClusterSecretStore — Azure Key Vault
# Provides cluster-wide access to Azure Key Vault via External Secrets Operator.
# Auth: Workload Identity Federation — no static client secrets.
# Requires: External Secrets Operator v0.9+, Azure Workload Identity configured on AKS.
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: azure-key-vault
  labels:
    app.kubernetes.io/name: azure-key-vault
    app.kubernetes.io/component: secret-store
    app.kubernetes.io/part-of: external-secrets
    app.kubernetes.io/managed-by: platform-team
  annotations:
    external-secrets.io/description: "Cluster-wide Azure Key Vault store using Workload Identity"
spec:
  provider:
    azurekv:
      # Azure Key Vault URL — replace with your vault
      vaultUrl: "https://my-keyvault.vault.azure.net"
      # Workload Identity auth — no client secret needed
      authType: WorkloadIdentity
      serviceAccountRef:
        name: "external-secrets"
        namespace: "external-secrets"
  conditions:
    - namespaceSelector:
        matchLabels:
          secrets.platform/azure-access: "true"
