# ClusterSecretStore — AWS Secrets Manager
# Provides cluster-wide access to AWS Secrets Manager via External Secrets Operator.
# Auth: IRSA (IAM Roles for Service Accounts) — no static AWS credentials.
# Requires: External Secrets Operator v0.9+, IRSA configured on EKS.
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    app.kubernetes.io/name: aws-secrets-manager
    app.kubernetes.io/component: secret-store
    app.kubernetes.io/part-of: external-secrets
    app.kubernetes.io/managed-by: platform-team
  annotations:
    external-secrets.io/description: "Cluster-wide AWS Secrets Manager store using IRSA"
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      # IRSA — the ServiceAccount must have the correct IAM role annotation:
      #   eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/external-secrets-operator
      auth:
        jwt:
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
  conditions:
    - namespaceSelector:
        matchLabels:
          secrets.platform/aws-access: "true"
