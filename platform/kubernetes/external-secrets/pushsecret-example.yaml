# PushSecret — Sync Kubernetes Secrets TO an External Store
# Use case: Operator-generated secrets (e.g., from a database operator) that need
# to be stored in Vault for audit, backup, or cross-cluster access.
# Requires: External Secrets Operator v0.9+ with PushSecret feature enabled.
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: push-operator-creds
  namespace: my-app
  labels:
    app.kubernetes.io/name: my-app
    app.kubernetes.io/component: secret-sync
    app.kubernetes.io/part-of: my-app
    app.kubernetes.io/managed-by: external-secrets
  annotations:
    external-secrets.io/description: "Push operator-generated database credentials to Vault"
    platform.example.com/owner: "team-platform"
spec:
  # How often to re-push (detect drift)
  refreshInterval: 10m

  # Reference the ClusterSecretStore to push to
  secretStoreRefs:
    - name: vault
      kind: ClusterSecretStore

  # Source Kubernetes Secret (created by a database operator, for example)
  selector:
    secret:
      name: postgres-operator-credentials

  # What to do if the remote secret already exists
  # Replace: overwrite | None: skip if exists
  updatePolicy: Replace

  # Map Kubernetes Secret keys to external store paths
  data:
    - match:
        secretKey: username
        remoteRef:
          remoteKey: "secret/data/my-app/operator-db"
          property: "username"
    - match:
        secretKey: password
        remoteRef:
          remoteKey: "secret/data/my-app/operator-db"
          property: "password"
    - match:
        secretKey: connection-string
        remoteRef:
          remoteKey: "secret/data/my-app/operator-db"
          property: "connection_string"
