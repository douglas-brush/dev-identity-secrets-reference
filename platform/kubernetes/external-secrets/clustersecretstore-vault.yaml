# ClusterSecretStore — HashiCorp Vault
# Provides cluster-wide access to Vault secrets via the External Secrets Operator.
# Auth: Kubernetes ServiceAccount token (JWT) validated by Vault's Kubernetes auth method.
# Requires: External Secrets Operator v0.9+, Vault Kubernetes auth backend enabled.
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: secret-store
    app.kubernetes.io/part-of: external-secrets
    app.kubernetes.io/managed-by: platform-team
  annotations:
    external-secrets.io/description: "Cluster-wide Vault secret store using Kubernetes auth"
spec:
  provider:
    vault:
      server: "https://vault.example.com"
      # Default path for KV v2; override per ExternalSecret if needed
      path: "secret"
      version: "v2"
      # Kubernetes auth method — no static tokens or AppRole secrets needed
      auth:
        kubernetes:
          # Vault auth backend mount path
          mountPath: "kubernetes"
          # ServiceAccount used by ESO to authenticate to Vault
          role: "external-secrets-operator"
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
      # TLS configuration — use the cluster CA bundle
      caProvider:
        type: "ConfigMap"
        name: "vault-ca-bundle"
        namespace: "external-secrets"
        key: "ca.crt"
  # Conditions restrict which namespaces can reference this store
  conditions:
    - namespaceSelector:
        matchLabels:
          secrets.platform/vault-access: "true"
