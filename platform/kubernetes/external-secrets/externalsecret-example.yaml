# ExternalSecret — Complete Example
# Syncs multiple secrets from Vault into a Kubernetes Secret.
# Demonstrates: multiple key references, refresh intervals, templating,
# ownership metadata, and data transformation.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: my-app
  labels:
    app.kubernetes.io/name: my-app
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: my-app
    app.kubernetes.io/managed-by: external-secrets
  annotations:
    external-secrets.io/description: "Application secrets synced from Vault"
    # Track which team owns this secret for audit purposes
    platform.example.com/owner: "team-backend"
    platform.example.com/classification: "confidential"
spec:
  # How often to re-sync from the external store
  # Production workloads: ≤ 1h to ensure rotation is picked up promptly
  refreshInterval: 30m

  # Reference the ClusterSecretStore
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore

  # Target Kubernetes Secret configuration
  target:
    name: app-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    # Template the resulting Secret with custom labels and type
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: my-app
          app.kubernetes.io/component: secrets
        annotations:
          platform.example.com/last-synced: "{{ .metadata.annotations.reconcile.external-secrets.io/last-synced }}"
      # Transform data — e.g., build a connection string from components
      data:
        DATABASE_URL: "postgresql://{{ .db_username }}:{{ .db_password }}@{{ .db_host }}:5432/{{ .db_name }}?sslmode=require"
        API_KEY: "{{ .api_key }}"
        TLS_CERT: "{{ .tls_cert }}"
        TLS_KEY: "{{ .tls_key }}"

  # Map external secret paths/keys to local data keys
  data:
    # Database credentials from Vault KV v2
    - secretKey: db_username
      remoteRef:
        key: "secret/data/my-app/database"
        property: "username"
    - secretKey: db_password
      remoteRef:
        key: "secret/data/my-app/database"
        property: "password"
    - secretKey: db_host
      remoteRef:
        key: "secret/data/my-app/database"
        property: "host"
    - secretKey: db_name
      remoteRef:
        key: "secret/data/my-app/database"
        property: "name"

    # API key from a separate Vault path
    - secretKey: api_key
      remoteRef:
        key: "secret/data/my-app/api"
        property: "key"

    # TLS certificate and key
    - secretKey: tls_cert
      remoteRef:
        key: "secret/data/my-app/tls"
        property: "certificate"
    - secretKey: tls_key
      remoteRef:
        key: "secret/data/my-app/tls"
        property: "private_key"

  # Fetch entire secret paths as JSON (alternative to individual keys)
  dataFrom:
    - extract:
        key: "secret/data/my-app/feature-flags"
        # Optional: only sync keys matching this regex
        # conversionStrategy: Default
