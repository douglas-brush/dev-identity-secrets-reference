# ClusterSecretStore — GCP Secret Manager
# Provides cluster-wide access to GCP Secret Manager via External Secrets Operator.
# Auth: Workload Identity Federation — no static service account keys.
# Requires: External Secrets Operator v0.9+, GKE Workload Identity configured.
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
  labels:
    app.kubernetes.io/name: gcp-secret-manager
    app.kubernetes.io/component: secret-store
    app.kubernetes.io/part-of: external-secrets
    app.kubernetes.io/managed-by: platform-team
  annotations:
    external-secrets.io/description: "Cluster-wide GCP Secret Manager store using Workload Identity"
spec:
  provider:
    gcpsm:
      # GCP project containing the secrets
      projectID: "my-project-id"
      # Workload Identity — KSA is bound to GSA via IAM policy binding:
      #   gcloud iam service-accounts add-iam-policy-binding \
      #     GSA_NAME@PROJECT.iam.gserviceaccount.com \
      #     --role roles/iam.workloadIdentityUser \
      #     --member "serviceAccount:PROJECT.svc.id.goog[NAMESPACE/KSA_NAME]"
      auth:
        workloadIdentity:
          clusterLocation: us-central1
          clusterName: my-cluster
          clusterProjectID: "my-project-id"
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
  conditions:
    - namespaceSelector:
        matchLabels:
          secrets.platform/gcp-access: "true"
