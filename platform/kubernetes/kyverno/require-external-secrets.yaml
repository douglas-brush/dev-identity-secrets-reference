# Kyverno Policy — Require External Secrets
# Blocks creation of raw Kubernetes Secrets with hardcoded data.
# Forces teams to use ExternalSecret or CSI driver instead.
# Exceptions: helm-managed secrets, cert-manager secrets, SA tokens.
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-external-secrets
  labels:
    app.kubernetes.io/name: require-external-secrets
    app.kubernetes.io/component: policy
    app.kubernetes.io/part-of: kyverno
    app.kubernetes.io/managed-by: platform-team
  annotations:
    policies.kyverno.io/title: "Require External Secrets"
    policies.kyverno.io/category: "Secret Management"
    policies.kyverno.io/severity: "high"
    policies.kyverno.io/subject: "Secret"
    policies.kyverno.io/description: >-
      Blocks creation of Kubernetes Secrets with inline data or stringData.
      All secrets must be provisioned via ExternalSecret, PushSecret, or
      Secrets Store CSI Driver. Exceptions are made for system-managed secrets
      (cert-manager, Helm, service account tokens).
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: block-inline-secrets
      match:
        any:
          - resources:
              kinds:
                - Secret
      exclude:
        any:
          # cert-manager managed secrets
          - resources:
              annotations:
                cert-manager.io/certificate-name: "*"
          # External Secrets Operator managed secrets
          - resources:
              annotations:
                reconcile.external-secrets.io/managed: "true"
          # Helm managed secrets
          - resources:
              labels:
                app.kubernetes.io/managed-by: "Helm"
          # Service account tokens
          - resources:
              annotations:
                kubernetes.io/service-account.name: "*"
          # System namespaces
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - cert-manager
                - external-secrets
                - spire
      preconditions:
        all:
          # Only block secrets with data or stringData (not empty secrets)
          - key: "{{ request.object.data || request.object.stringData || '' }}"
            operator: NotEquals
            value: ""
      validate:
        message: >-
          Direct creation of Kubernetes Secrets with inline data is not allowed.
          Use ExternalSecret or Secrets Store CSI Driver to provision secrets
          from an external secret store (Vault, AWS Secrets Manager, etc.).
          See: platform/kubernetes/external-secrets/ for examples.
        deny: {}
