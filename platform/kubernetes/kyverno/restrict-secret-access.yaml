# Kyverno Policy — Restrict ClusterSecretStore Access
# Only namespaces with the appropriate label can create ExternalSecret
# resources that reference ClusterSecretStores. Prevents unauthorized
# namespaces from accessing centralized secret stores.
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-secret-store-access
  labels:
    app.kubernetes.io/name: restrict-secret-store-access
    app.kubernetes.io/component: policy
    app.kubernetes.io/part-of: kyverno
    app.kubernetes.io/managed-by: platform-team
  annotations:
    policies.kyverno.io/title: "Restrict ClusterSecretStore Access"
    policies.kyverno.io/category: "Secret Management"
    policies.kyverno.io/severity: "high"
    policies.kyverno.io/subject: "ExternalSecret"
    policies.kyverno.io/description: >-
      Restricts which namespaces can reference ClusterSecretStores.
      Namespaces must have the appropriate label to access each provider's
      secret store (e.g., secrets.platform/vault-access=true).
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    # Vault access requires the vault-access label
    - name: restrict-vault-access
      match:
        any:
          - resources:
              kinds:
                - ExternalSecret
      preconditions:
        all:
          - key: "{{ request.object.spec.secretStoreRef.name }}"
            operator: Equals
            value: "vault"
          - key: "{{ request.object.spec.secretStoreRef.kind }}"
            operator: Equals
            value: "ClusterSecretStore"
      validate:
        message: >-
          This namespace is not authorized to access the Vault ClusterSecretStore.
          Add the label 'secrets.platform/vault-access: "true"' to your namespace
          (requires platform team approval).
        deny:
          conditions:
            all:
              - key: "{{ request.namespace | label(@, 'secrets.platform/vault-access') }}"
                operator: NotEquals
                value: "true"

    # AWS access requires the aws-access label
    - name: restrict-aws-access
      match:
        any:
          - resources:
              kinds:
                - ExternalSecret
      preconditions:
        all:
          - key: "{{ request.object.spec.secretStoreRef.name }}"
            operator: Equals
            value: "aws-secrets-manager"
          - key: "{{ request.object.spec.secretStoreRef.kind }}"
            operator: Equals
            value: "ClusterSecretStore"
      validate:
        message: >-
          This namespace is not authorized to access the AWS ClusterSecretStore.
          Add the label 'secrets.platform/aws-access: "true"' to your namespace.
        deny:
          conditions:
            all:
              - key: "{{ request.namespace | label(@, 'secrets.platform/aws-access') }}"
                operator: NotEquals
                value: "true"

    # Azure access requires the azure-access label
    - name: restrict-azure-access
      match:
        any:
          - resources:
              kinds:
                - ExternalSecret
      preconditions:
        all:
          - key: "{{ request.object.spec.secretStoreRef.name }}"
            operator: Equals
            value: "azure-key-vault"
          - key: "{{ request.object.spec.secretStoreRef.kind }}"
            operator: Equals
            value: "ClusterSecretStore"
      validate:
        message: >-
          This namespace is not authorized to access the Azure ClusterSecretStore.
          Add the label 'secrets.platform/azure-access: "true"' to your namespace.
        deny:
          conditions:
            all:
              - key: "{{ request.namespace | label(@, 'secrets.platform/azure-access') }}"
                operator: NotEquals
                value: "true"

    # GCP access requires the gcp-access label
    - name: restrict-gcp-access
      match:
        any:
          - resources:
              kinds:
                - ExternalSecret
      preconditions:
        all:
          - key: "{{ request.object.spec.secretStoreRef.name }}"
            operator: Equals
            value: "gcp-secret-manager"
          - key: "{{ request.object.spec.secretStoreRef.kind }}"
            operator: Equals
            value: "ClusterSecretStore"
      validate:
        message: >-
          This namespace is not authorized to access the GCP ClusterSecretStore.
          Add the label 'secrets.platform/gcp-access: "true"' to your namespace.
        deny:
          conditions:
            all:
              - key: "{{ request.namespace | label(@, 'secrets.platform/gcp-access') }}"
                operator: NotEquals
                value: "true"
