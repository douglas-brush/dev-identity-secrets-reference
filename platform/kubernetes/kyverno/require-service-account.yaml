# Kyverno Policy — Require Non-Default Service Account
# All Deployments, StatefulSets, DaemonSets, and Jobs must specify a
# dedicated service account. Using the "default" SA violates least-privilege.
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-service-account
  labels:
    app.kubernetes.io/name: require-service-account
    app.kubernetes.io/component: policy
    app.kubernetes.io/part-of: kyverno
    app.kubernetes.io/managed-by: platform-team
  annotations:
    policies.kyverno.io/title: "Require Non-Default Service Account"
    policies.kyverno.io/category: "Security"
    policies.kyverno.io/severity: "medium"
    policies.kyverno.io/subject: "Deployment,StatefulSet,DaemonSet,Job"
    policies.kyverno.io/description: >-
      Requires all workloads to specify a dedicated service account.
      The default service account has broad permissions and must not
      be used by application workloads.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-non-default-sa
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
      validate:
        message: >-
          Workloads must specify a dedicated service account via
          spec.template.spec.serviceAccountName. The "default" service account
          is not allowed. Create a ServiceAccount with least-privilege RBAC
          for your workload.
        pattern:
          spec:
            template:
              spec:
                serviceAccountName: "!default"

    - name: require-sa-set
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
      validate:
        message: >-
          Workloads must set spec.template.spec.serviceAccountName.
          Omitting this field defaults to the "default" service account,
          which violates least-privilege.
        pattern:
          spec:
            template:
              spec:
                serviceAccountName: "?*"
