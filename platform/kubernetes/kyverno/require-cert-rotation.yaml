# Kyverno Policy — Require Certificate Rotation
# All cert-manager Certificate resources must have renewBefore set
# and a maximum duration. Prevents certificates from expiring without
# automated renewal.
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-cert-rotation
  labels:
    app.kubernetes.io/name: require-cert-rotation
    app.kubernetes.io/component: policy
    app.kubernetes.io/part-of: kyverno
    app.kubernetes.io/managed-by: platform-team
  annotations:
    policies.kyverno.io/title: "Require Certificate Rotation Policy"
    policies.kyverno.io/category: "Certificate Management"
    policies.kyverno.io/severity: "high"
    policies.kyverno.io/subject: "Certificate"
    policies.kyverno.io/description: >-
      Requires all cert-manager Certificate resources to have:
      1. A renewBefore field set (automated renewal before expiry)
      2. A maximum duration of 2160h (90 days) for non-CA certificates
      3. Private key rotation policy set to Always
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-renew-before
      match:
        any:
          - resources:
              kinds:
                - Certificate
      validate:
        message: >-
          Certificate resources must have spec.renewBefore set to ensure
          automated renewal before expiry. Recommended: at least 1/6 of
          the certificate duration.
        pattern:
          spec:
            renewBefore: "?*"

    - name: require-private-key-rotation
      match:
        any:
          - resources:
              kinds:
                - Certificate
      # Skip CA certificates — they have different rotation requirements
      preconditions:
        all:
          - key: "{{ request.object.spec.isCA || false }}"
            operator: NotEquals
            value: true
      validate:
        message: >-
          Non-CA Certificate resources must set spec.privateKey.rotationPolicy
          to "Always" to ensure forward secrecy on renewal.
        pattern:
          spec:
            privateKey:
              rotationPolicy: "Always"

    - name: max-certificate-duration
      match:
        any:
          - resources:
              kinds:
                - Certificate
      preconditions:
        all:
          - key: "{{ request.object.spec.isCA || false }}"
            operator: NotEquals
            value: true
      validate:
        message: >-
          Non-CA Certificate duration must not exceed 2160h (90 days).
          Short-lived certificates reduce the blast radius of key compromise.
        deny:
          conditions:
            any:
              # Block if duration is longer than 90 days (2160h)
              # This catches common long durations
              - key: "{{ request.object.spec.duration }}"
                operator: AnyIn
                value:
                  - "8760h"   # 1 year
                  - "4380h"   # 6 months
                  - "2880h"   # 120 days
                  - "17520h"  # 2 years
                  - "26280h"  # 3 years
                  - "43800h"  # 5 years
