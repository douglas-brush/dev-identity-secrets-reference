# Kyverno Policy — Audit Secret Age
# Reports on Kubernetes Secrets older than 90 days. Secrets that persist
# without rotation may indicate stale credentials or misconfigured
# ExternalSecret refresh intervals.
# Mode: Audit (does not block — generates policy reports only).
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: audit-secret-age
  labels:
    app.kubernetes.io/name: audit-secret-age
    app.kubernetes.io/component: policy
    app.kubernetes.io/part-of: kyverno
    app.kubernetes.io/managed-by: platform-team
  annotations:
    policies.kyverno.io/title: "Audit Secret Age"
    policies.kyverno.io/category: "Secret Management"
    policies.kyverno.io/severity: "medium"
    policies.kyverno.io/subject: "Secret"
    policies.kyverno.io/description: >-
      Audits Kubernetes Secrets that have not been updated in 90 days.
      Generates a policy report entry for review. Stale secrets may
      indicate credentials that should be rotated or ExternalSecret
      sync issues.
spec:
  # Audit only — do not block
  validationFailureAction: Audit
  background: true
  rules:
    - name: check-secret-age
      match:
        any:
          - resources:
              kinds:
                - Secret
      exclude:
        any:
          # Exclude system namespaces
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
          # Exclude service account tokens
          - resources:
              selector:
                matchLabels:
                  kubernetes.io/legacy-token-last-used: "*"
          # Exclude Helm release secrets
          - resources:
              selector:
                matchLabels:
                  owner: "helm"
      validate:
        message: >-
          Secret '{{ request.object.metadata.name }}' in namespace
          '{{ request.object.metadata.namespace }}' has not been updated
          in over 90 days (created: {{ request.object.metadata.creationTimestamp }}).
          Review whether this secret needs rotation or if the ExternalSecret
          refresh interval is configured correctly.
        deny:
          conditions:
            all:
              - key: "{{ time_since('', '{{ request.object.metadata.creationTimestamp }}', '') }}"
                operator: GreaterThan
                value: "2160h"
