# Reusable secret scanning workflow.
# Runs multiple detection layers: gitleaks, pattern matching, SOPS validation.
#
# Usage:
#   jobs:
#     scan:
#       uses: ./.github/workflows/secret-scan.yml
#       with:
#         scan_mode: diff        # 'diff' for PRs, 'full' for scheduled scans
#         fail_on_finding: true

name: Secret Scan

on:
  workflow_call:
    inputs:
      scan_mode:
        description: "'diff' scans only changed files, 'full' scans entire repo"
        required: false
        type: string
        default: diff
      fail_on_finding:
        description: Fail the workflow if any secret is detected
        required: false
        type: boolean
        default: true
      gitleaks_version:
        description: Gitleaks version to use
        required: false
        type: string
        default: '8.18.4'
      sops_paths:
        description: "Glob pattern for files that must be SOPS-encrypted (e.g. 'secrets/**/*.yaml')"
        required: false
        type: string
        default: 'secrets/**/*.yaml'
      additional_patterns_file:
        description: Path to a custom regex patterns file for extra scanning
        required: false
        type: string
        default: ''
    outputs:
      findings_count:
        description: Total number of findings across all scanners
        value: ${{ jobs.scan.outputs.total_findings }}
      sarif_artifact:
        description: Name of the SARIF artifact uploaded
        value: secret-scan-results

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write  # For uploading SARIF to GitHub Security tab
    outputs:
      total_findings: ${{ steps.aggregate.outputs.total }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for diff-based scanning

      # ── Layer 1: Gitleaks ──────────────────────────────────────────────
      - name: Run gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          version: ${{ inputs.gitleaks_version }}
          args: >-
            ${{ inputs.scan_mode == 'diff' && '--log-opts="--diff-filter=d HEAD~1..HEAD"' || '' }}
            --report-format=sarif
            --report-path=gitleaks-report.sarif
            --exit-code=0
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Count gitleaks findings
        id: gitleaks-count
        run: |
          set -euo pipefail
          if [[ -f gitleaks-report.sarif ]]; then
            COUNT=$(jq '[.runs[].results[]] | length' gitleaks-report.sarif)
          else
            COUNT=0
          fi
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "::notice::Gitleaks findings: ${COUNT}"

      # ── Layer 2: Pattern matching for common secret formats ────────────
      - name: Check for common secret patterns
        id: pattern-scan
        run: |
          set -euo pipefail

          FINDING_COUNT=0
          REPORT_FILE="pattern-findings.txt"
          : > "$REPORT_FILE"

          # Patterns that indicate plaintext secrets
          declare -A PATTERNS=(
            ["AWS Access Key"]='AKIA[0-9A-Z]{16}'
            ["AWS Secret Key"]='(?<![A-Za-z0-9/+=])[A-Za-z0-9/+=]{40}(?![A-Za-z0-9/+=])'
            ["GitHub PAT (classic)"]='ghp_[A-Za-z0-9]{36}'
            ["GitHub PAT (fine-grained)"]='github_pat_[A-Za-z0-9_]{82}'
            ["GitHub OAuth"]='gho_[A-Za-z0-9]{36}'
            ["GitHub App Token"]='ghu_[A-Za-z0-9]{36}'
            ["Slack Token"]='xox[bpors]-[0-9a-zA-Z-]{10,}'
            ["Slack Webhook"]='https://hooks\.slack\.com/services/T[A-Z0-9]{8,}/B[A-Z0-9]{8,}/[A-Za-z0-9]{24}'
            ["Private Key Header"]='-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'
            ["Generic API Key assignment"]='(?i)(api[_-]?key|apikey|api[_-]?secret)\s*[:=]\s*["\x27]?[A-Za-z0-9_\-]{16,}["\x27]?'
            ["Generic Password assignment"]='(?i)(password|passwd|pwd)\s*[:=]\s*["\x27][^\s"]{8,}["\x27]'
            ["Bearer Token"]='(?i)bearer\s+[A-Za-z0-9\-._~+/]+=*'
            ["Vault Token"]='hvs\.[A-Za-z0-9]{24,}'
            ["Azure Client Secret"]='(?i)(client[_-]?secret|azure[_-]?secret)\s*[:=]\s*["\x27][A-Za-z0-9~._\-]{34,}["\x27]'
          )

          # Determine files to scan
          if [[ "${{ inputs.scan_mode }}" == "diff" ]]; then
            FILES=$(git diff --name-only --diff-filter=ACMR HEAD~1..HEAD 2>/dev/null || git ls-files)
          else
            FILES=$(git ls-files)
          fi

          # Exclude known binary/generated paths
          FILES=$(echo "$FILES" | grep -vE '\.(png|jpg|gif|ico|woff|ttf|eot|svg|lock)$' || true)
          FILES=$(echo "$FILES" | grep -vE '(node_modules/|vendor/|\.git/)' || true)

          while IFS= read -r pattern_name; do
            pattern="${PATTERNS[$pattern_name]}"
            # Use grep -P for PCRE support
            MATCHES=$(echo "$FILES" | xargs grep -lPn "$pattern" 2>/dev/null || true)
            if [[ -n "$MATCHES" ]]; then
              echo "::warning::Pattern match: ${pattern_name}"
              echo "--- ${pattern_name} ---" >> "$REPORT_FILE"
              echo "$MATCHES" >> "$REPORT_FILE"
              echo "" >> "$REPORT_FILE"
              MATCH_COUNT=$(echo "$MATCHES" | wc -l | tr -d ' ')
              FINDING_COUNT=$((FINDING_COUNT + MATCH_COUNT))
            fi
          done < <(printf '%s\n' "${!PATTERNS[@]}")

          echo "count=${FINDING_COUNT}" >> "$GITHUB_OUTPUT"
          echo "::notice::Pattern scan findings: ${FINDING_COUNT}"

      # ── Layer 3: SOPS encryption validation ───────────────────────────
      - name: Validate SOPS encryption
        id: sops-check
        run: |
          set -euo pipefail

          FINDING_COUNT=0
          SOPS_PATTERN="${{ inputs.sops_paths }}"

          # Find files matching the SOPS pattern
          SOPS_FILES=$(find . -path "./${SOPS_PATTERN}" -type f 2>/dev/null || true)

          if [[ -z "$SOPS_FILES" ]]; then
            echo "::notice::No files matching SOPS pattern '${SOPS_PATTERN}' found"
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue

            # Check if file has SOPS metadata (encrypted marker)
            if ! grep -q 'sops:' "$file" 2>/dev/null && \
               ! grep -q '"sops"' "$file" 2>/dev/null; then
              echo "::error file=${file}::File should be SOPS-encrypted but has no SOPS metadata"
              FINDING_COUNT=$((FINDING_COUNT + 1))
              continue
            fi

            # Check that encrypted values are actually present (ENC[] markers for YAML)
            if grep -qE '^\s+\w+:\s+[^E]' "$file" 2>/dev/null; then
              # Has non-ENC values — check if they're under sops: metadata block
              # Extract lines that look like key-value but aren't SOPS metadata
              NON_SOPS_LINES=$(awk '
                /^sops:/ { in_sops=1; next }
                /^[^ ]/ { in_sops=0 }
                !in_sops && /^  [a-zA-Z_]+: / && !/ENC\[/ { print NR": "$0 }
              ' "$file" 2>/dev/null || true)

              if [[ -n "$NON_SOPS_LINES" ]]; then
                echo "::warning file=${file}::File may contain unencrypted values"
                FINDING_COUNT=$((FINDING_COUNT + 1))
              fi
            fi
          done <<< "$SOPS_FILES"

          echo "count=${FINDING_COUNT}" >> "$GITHUB_OUTPUT"
          echo "::notice::SOPS validation findings: ${FINDING_COUNT}"

      # ── Layer 4: Custom patterns (optional) ────────────────────────────
      - name: Run custom pattern scan
        id: custom-scan
        if: inputs.additional_patterns_file != ''
        run: |
          set -euo pipefail
          PATTERNS_FILE="${{ inputs.additional_patterns_file }}"
          FINDING_COUNT=0

          if [[ ! -f "$PATTERNS_FILE" ]]; then
            echo "::warning::Custom patterns file '${PATTERNS_FILE}' not found, skipping"
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          while IFS= read -r pattern; do
            [[ -z "$pattern" || "$pattern" == \#* ]] && continue
            MATCHES=$(git ls-files | xargs grep -lPn "$pattern" 2>/dev/null || true)
            if [[ -n "$MATCHES" ]]; then
              MATCH_COUNT=$(echo "$MATCHES" | wc -l | tr -d ' ')
              FINDING_COUNT=$((FINDING_COUNT + MATCH_COUNT))
              echo "::warning::Custom pattern match (${MATCH_COUNT} files): ${pattern}"
            fi
          done < "$PATTERNS_FILE"

          echo "count=${FINDING_COUNT}" >> "$GITHUB_OUTPUT"

      # ── Aggregate results ──────────────────────────────────────────────
      - name: Aggregate findings
        id: aggregate
        run: |
          set -euo pipefail
          GITLEAKS=${{ steps.gitleaks-count.outputs.count || '0' }}
          PATTERNS=${{ steps.pattern-scan.outputs.count || '0' }}
          SOPS=${{ steps.sops-check.outputs.count || '0' }}
          CUSTOM=${{ steps.custom-scan.outputs.count || '0' }}

          TOTAL=$((GITLEAKS + PATTERNS + SOPS + CUSTOM))
          echo "total=${TOTAL}" >> "$GITHUB_OUTPUT"

          echo "## Secret Scan Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Scanner | Findings |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gitleaks | ${GITLEAKS} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pattern Match | ${PATTERNS} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SOPS Validation | ${SOPS} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Custom Patterns | ${CUSTOM} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Total** | **${TOTAL}** |" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$TOTAL" -gt 0 ]]; then
            echo "::error::Found ${TOTAL} potential secret(s) across all scanners"
          else
            echo "::notice::No secrets detected"
          fi

      - name: Upload SARIF results
        if: always() && hashFiles('gitleaks-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-report.sarif
          category: gitleaks

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-results
          path: |
            gitleaks-report.sarif
            pattern-findings.txt
          retention-days: 30

      - name: Fail on findings
        if: inputs.fail_on_finding && steps.aggregate.outputs.total != '0'
        run: |
          echo "::error::Secret scan found ${{ steps.aggregate.outputs.total }} issue(s). Review the scan artifacts for details."
          exit 1
