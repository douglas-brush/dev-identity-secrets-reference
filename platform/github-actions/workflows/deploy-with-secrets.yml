# Complete end-to-end deployment pipeline with secrets management.
#
# Pipeline stages:
# 1. Build — compile, test, create container image
# 2. OIDC Auth — authenticate to cloud provider (no static secrets)
# 3. SOPS Decrypt — decrypt environment-specific config
# 4. Deploy — roll out to Kubernetes
# 5. Verify — confirm secrets are delivered and app is healthy
# 6. Cleanup — revoke tokens, remove decrypted files
#
# Prerequisites:
# - Cloud provider OIDC federation configured
# - SOPS-encrypted config in secrets/<environment>/
# - Kubernetes cluster accessible
# - Container registry accessible

name: "Example: Deploy with Secrets"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
      image_tag:
        description: Container image tag to deploy (leave empty to build from HEAD)
        required: false
        type: string
        default: ''
      dry_run:
        description: Dry run — validate everything but do not deploy
        required: false
        type: boolean
        default: false

permissions:
  id-token: write      # OIDC token requests
  contents: read
  packages: write      # Container registry push
  actions: read        # Required for OIDC

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false  # Never cancel in-progress deployments

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Stage 1: Build ────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: inputs.image_tag == ''
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_tag: ${{ steps.meta.outputs.version }}
      full_image: ${{ steps.meta.outputs.full_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Generate image metadata
        id: meta
        run: |
          set -euo pipefail
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION="${{ inputs.environment }}-${SHORT_SHA}"
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "full_image=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "::notice::Building image: ${FULL_IMAGE}"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.full_image }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.environment }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Verify image
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${{ steps.meta.outputs.full_image }}"
          echo "::notice::Image pushed — digest: ${{ steps.build.outputs.digest }}"

  # ── Stage 2: OIDC Auth + SOPS Decrypt ─────────────────────────────────
  prepare-secrets:
    name: Decrypt Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    environment: ${{ inputs.environment }}
    outputs:
      config_hash: ${{ steps.decrypt.outputs.config_hash }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to cloud (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
          role-session-name: deploy-${{ inputs.environment }}-${{ github.run_id }}
          role-duration-seconds: 900

      - name: Install SOPS
        run: |
          set -euo pipefail
          SOPS_VERSION="3.9.0"
          curl -fsSL -o /tmp/sops \
            "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
          chmod +x /tmp/sops
          sudo mv /tmp/sops /usr/local/bin/sops

      - name: Decrypt environment config
        id: decrypt
        run: |
          set -euo pipefail
          ENVIRONMENT="${{ inputs.environment }}"
          DECRYPT_DIR=$(mktemp -d)
          echo "decrypt_dir=${DECRYPT_DIR}" >> "$GITHUB_OUTPUT"

          SOPS_DIR="secrets/${ENVIRONMENT}"
          if [[ ! -d "$SOPS_DIR" ]]; then
            echo "::error::Secret directory not found: ${SOPS_DIR}"
            exit 1
          fi

          FILE_COUNT=0
          for file in "${SOPS_DIR}"/*.yaml "${SOPS_DIR}"/*.yml "${SOPS_DIR}"/*.json; do
            [[ ! -f "$file" ]] && continue

            BASENAME=$(basename "$file")
            echo "Decrypting: ${file}"
            sops --decrypt "$file" > "${DECRYPT_DIR}/${BASENAME}"
            FILE_COUNT=$((FILE_COUNT + 1))
          done

          if [[ "$FILE_COUNT" -eq 0 ]]; then
            echo "::error::No SOPS files found in ${SOPS_DIR}"
            exit 1
          fi

          # Hash the decrypted config for verification later
          CONFIG_HASH=$(find "$DECRYPT_DIR" -type f -exec sha256sum {} \; | sort | sha256sum | cut -d' ' -f1)
          echo "config_hash=${CONFIG_HASH}" >> "$GITHUB_OUTPUT"
          echo "::notice::Decrypted ${FILE_COUNT} config file(s) — hash: ${CONFIG_HASH:0:12}"

      - name: Validate decrypted config
        run: |
          set -euo pipefail
          DECRYPT_DIR="${{ steps.decrypt.outputs.decrypt_dir }}"

          for file in "${DECRYPT_DIR}"/*; do
            [[ ! -f "$file" ]] && continue
            # Validate YAML/JSON syntax
            if [[ "$file" == *.yaml || "$file" == *.yml ]]; then
              python3 -c "import yaml; yaml.safe_load(open('$file'))" || {
                echo "::error::Invalid YAML: $(basename "$file")"
                exit 1
              }
            elif [[ "$file" == *.json ]]; then
              python3 -c "import json; json.load(open('$file'))" || {
                echo "::error::Invalid JSON: $(basename "$file")"
                exit 1
              }
            fi
          done

          echo "::notice::All decrypted config files are syntactically valid"

      - name: Upload encrypted config artifact
        uses: actions/upload-artifact@v4
        with:
          name: decrypted-config-${{ inputs.environment }}
          path: ${{ steps.decrypt.outputs.decrypt_dir }}/
          retention-days: 1  # Shortest retention — these are secrets
          if-no-files-found: error

  # ── Stage 3: Deploy ───────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build, prepare-secrets]
    if: >-
      always() &&
      !inputs.dry_run &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      needs.prepare-secrets.result == 'success'
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.deploy.outputs.app_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to cloud (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
          role-session-name: deploy-k8s-${{ github.run_id }}
          role-duration-seconds: 900

      - name: Configure kubectl
        run: |
          set -euo pipefail
          CLUSTER_NAME="${{ vars.K8S_CLUSTER_NAME }}"
          REGION="${{ vars.AWS_REGION || 'us-east-1' }}"

          if [[ -z "${CLUSTER_NAME:-}" ]]; then
            echo "::error::K8S_CLUSTER_NAME not configured"
            exit 1
          fi

          aws eks update-kubeconfig \
            --name "$CLUSTER_NAME" \
            --region "$REGION"

          kubectl cluster-info

      - name: Download decrypted config
        uses: actions/download-artifact@v4
        with:
          name: decrypted-config-${{ inputs.environment }}
          path: /tmp/decrypted-config/

      - name: Create Kubernetes secrets
        run: |
          set -euo pipefail
          NAMESPACE="${{ vars.K8S_NAMESPACE || 'default' }}"
          SECRET_NAME="app-secrets"

          # Build secret from decrypted files
          SECRET_ARGS=""
          for file in /tmp/decrypted-config/*; do
            [[ ! -f "$file" ]] && continue
            BASENAME=$(basename "$file")
            SECRET_ARGS="${SECRET_ARGS} --from-file=${BASENAME}=${file}"
          done

          kubectl create secret generic "${SECRET_NAME}" \
            --namespace="${NAMESPACE}" \
            ${SECRET_ARGS} \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "::notice::Kubernetes secret '${SECRET_NAME}' applied to namespace '${NAMESPACE}'"

      - name: Deploy application
        id: deploy
        run: |
          set -euo pipefail
          NAMESPACE="${{ vars.K8S_NAMESPACE || 'default' }}"
          DEPLOYMENT="${{ vars.K8S_DEPLOYMENT || 'app' }}"

          # Determine image tag
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            IMAGE_TAG="${{ inputs.image_tag }}"
          else
            IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
          fi
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"

          # Update deployment image
          kubectl set image "deployment/${DEPLOYMENT}" \
            --namespace="${NAMESPACE}" \
            "${DEPLOYMENT}=${FULL_IMAGE}" 2>/dev/null || {
              echo "::warning::kubectl set image failed — deployment may not exist yet"
              echo "::notice::Apply your Kubernetes manifests first, then re-run this pipeline"
              exit 0
            }

          # Wait for rollout
          kubectl rollout status "deployment/${DEPLOYMENT}" \
            --namespace="${NAMESPACE}" \
            --timeout=300s

          echo "::notice::Deployment '${DEPLOYMENT}' rolled out with image ${FULL_IMAGE}"

          # Capture app URL if available
          APP_URL=$(kubectl get ingress --namespace="${NAMESPACE}" \
            -o jsonpath='{.items[0].spec.rules[0].host}' 2>/dev/null || echo '')
          if [[ -n "$APP_URL" ]]; then
            echo "app_url=https://${APP_URL}" >> "$GITHUB_OUTPUT"
          fi

  # ── Stage 4: Verify ───────────────────────────────────────────────────
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy, prepare-secrets]
    if: always() && needs.deploy.result == 'success'
    environment: ${{ inputs.environment }}
    steps:
      - name: Authenticate to cloud (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
          role-session-name: verify-${{ github.run_id }}
          role-duration-seconds: 900

      - name: Configure kubectl
        run: |
          set -euo pipefail
          aws eks update-kubeconfig \
            --name "${{ vars.K8S_CLUSTER_NAME }}" \
            --region "${{ vars.AWS_REGION || 'us-east-1' }}"

      - name: Verify secrets delivery
        run: |
          set -euo pipefail
          NAMESPACE="${{ vars.K8S_NAMESPACE || 'default' }}"
          SECRET_NAME="app-secrets"

          # Verify the secret exists
          if ! kubectl get secret "${SECRET_NAME}" -n "${NAMESPACE}" >/dev/null 2>&1; then
            echo "::error::Secret '${SECRET_NAME}' not found in namespace '${NAMESPACE}'"
            exit 1
          fi

          # Verify the secret has data keys
          KEY_COUNT=$(kubectl get secret "${SECRET_NAME}" -n "${NAMESPACE}" \
            -o json | jq '.data | keys | length')

          if [[ "$KEY_COUNT" -eq 0 ]]; then
            echo "::error::Secret '${SECRET_NAME}' has no data keys"
            exit 1
          fi

          echo "::notice::Secret '${SECRET_NAME}' verified — ${KEY_COUNT} data key(s)"

      - name: Verify pod health
        run: |
          set -euo pipefail
          NAMESPACE="${{ vars.K8S_NAMESPACE || 'default' }}"
          DEPLOYMENT="${{ vars.K8S_DEPLOYMENT || 'app' }}"

          # Check pod status
          READY_PODS=$(kubectl get pods -n "${NAMESPACE}" \
            -l "app=${DEPLOYMENT}" \
            --field-selector=status.phase=Running \
            --no-headers 2>/dev/null | wc -l | tr -d ' ')

          TOTAL_PODS=$(kubectl get pods -n "${NAMESPACE}" \
            -l "app=${DEPLOYMENT}" \
            --no-headers 2>/dev/null | wc -l | tr -d ' ')

          echo "::notice::Pods: ${READY_PODS}/${TOTAL_PODS} running"

          if [[ "$READY_PODS" -eq 0 ]]; then
            echo "::error::No pods are running"
            # Dump recent events for debugging
            kubectl get events -n "${NAMESPACE}" --sort-by='.lastTimestamp' | tail -20
            exit 1
          fi

      - name: Run health check
        run: |
          set -euo pipefail
          NAMESPACE="${{ vars.K8S_NAMESPACE || 'default' }}"
          DEPLOYMENT="${{ vars.K8S_DEPLOYMENT || 'app' }}"

          # Port-forward and check health endpoint
          POD_NAME=$(kubectl get pods -n "${NAMESPACE}" \
            -l "app=${DEPLOYMENT}" \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)

          if [[ -z "$POD_NAME" ]]; then
            echo "::warning::No running pod found for health check"
            exit 0
          fi

          # Background port-forward
          kubectl port-forward -n "${NAMESPACE}" "pod/${POD_NAME}" 8080:8080 &
          PF_PID=$!
          sleep 3

          # Check health
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/health 2>/dev/null || echo '000')
          kill $PF_PID 2>/dev/null || true

          if [[ "$HTTP_CODE" == "200" ]]; then
            echo "::notice::Health check passed (HTTP ${HTTP_CODE})"
          else
            echo "::warning::Health check returned HTTP ${HTTP_CODE} (may not have /health endpoint)"
          fi

  # ── Stage 5: Cleanup ──────────────────────────────────────────────────
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [build, prepare-secrets, deploy, verify]
    if: always()
    steps:
      - name: Delete decrypted config artifact
        uses: geekyeggo/delete-artifact@v5
        with:
          name: decrypted-config-${{ inputs.environment }}
          failOnError: false

      - name: Cleanup local secrets
        run: |
          set -euo pipefail
          # Remove any decrypted files from runner
          find /tmp -name 'decrypted-config' -type d -exec rm -rf {} + 2>/dev/null || true
          rm -f ~/.kube/config 2>/dev/null || true
          echo "::notice::Local cleanup complete"

      - name: Generate deployment summary
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Environment:** ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Dry Run:** ${{ inputs.dry_run }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Config Hash:** ${{ needs.prepare-secrets.outputs.config_hash }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Decrypt Secrets | ${{ needs.prepare-secrets.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deploy | ${{ needs.deploy.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Verify | ${{ needs.verify.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cleanup | completed |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "> Dry run mode — no changes were deployed." >> "$GITHUB_STEP_SUMMARY"
          fi
