# Complete example: GitHub Actions OIDC authentication to Google Cloud.
#
# Demonstrates:
# - OIDC workload identity federation — no service account keys
# - Secret Manager access with masking
# - Cloud Storage (GCS) access verification
# - Artifact Registry login for container operations
# - GKE credential fetch and cluster verification
# - Explicit session cleanup
#
# Prerequisites:
# - GCP Workload Identity Pool configured for GitHub Actions
# - Workload Identity Provider with attribute mapping for this repo
# - Service account with appropriate IAM roles
# - Artifact Registry repository (optional)
# - GCS bucket with roles/storage.objectViewer (optional)

name: "Example: OIDC to GCP"

on:
  workflow_dispatch:
    inputs:
      gcp_project_id:
        description: GCP project ID
        required: true
        type: string
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - staging
          - production

permissions:
  id-token: write    # OIDC token request
  contents: read

concurrency:
  group: gcp-ops-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  # ── Step 1: Authenticate ──────────────────────────────────────────────
  gcp-auth:
    name: Authenticate to GCP
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: ${{ inputs.environment }}
    outputs:
      project_id: ${{ inputs.gcp_project_id }}
      service_account: ${{ steps.verify.outputs.service_account }}
    steps:
      - name: Authenticate to Google Cloud via OIDC
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # Workload Identity Federation — no JSON key file needed
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_lifetime: 600s  # 10 minutes

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ inputs.gcp_project_id }}

      - name: Verify authentication
        id: verify
        run: |
          set -euo pipefail
          # Verify we're authenticated
          ACCOUNT=$(gcloud auth list --filter=status:ACTIVE --format='value(account)' 2>/dev/null)
          PROJECT=$(gcloud config get-value project 2>/dev/null)
          echo "::notice::Authenticated as ${ACCOUNT} in project ${PROJECT}"
          echo "service_account=${ACCOUNT}" >> "$GITHUB_OUTPUT"

  # ── Step 2: Secret Manager access ────────────────────────────────────
  secret-manager:
    name: Read from Secret Manager
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: gcp-auth
    environment: ${{ inputs.environment }}
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ inputs.gcp_project_id }}

      - name: Read secret from Secret Manager
        id: read-secret
        run: |
          set -euo pipefail
          PROJECT_ID="${{ inputs.gcp_project_id }}"
          SECRET_NAME="${{ vars.GCP_SECRET_NAME }}"

          if [[ -z "${SECRET_NAME:-}" ]]; then
            echo "::notice::GCP_SECRET_NAME not configured, listing available secrets"
            SECRET_LIST=$(gcloud secrets list --project="$PROJECT_ID" \
              --format='value(name)' 2>/dev/null || true)

            if [[ -n "$SECRET_LIST" ]]; then
              SECRET_COUNT=$(echo "$SECRET_LIST" | wc -l | tr -d ' ')
              echo "::notice::Found ${SECRET_COUNT} secret(s) in project"
            else
              echo "::notice::No secrets found in project"
            fi
            exit 0
          fi

          # Read the latest version of the secret
          SECRET_VALUE=$(gcloud secrets versions access latest \
            --secret="$SECRET_NAME" \
            --project="$PROJECT_ID" 2>/dev/null) || {
              echo "::error::Failed to read secret: ${SECRET_NAME}"
              exit 1
            }

          # Mask the value in logs
          echo "::add-mask::${SECRET_VALUE}"
          echo "::notice::Secret '${SECRET_NAME}' read successfully"

          # Parse if JSON — count keys as a verification step
          if echo "$SECRET_VALUE" | jq empty 2>/dev/null; then
            KEY_COUNT=$(echo "$SECRET_VALUE" | jq 'keys | length')
            echo "::notice::Secret contains ${KEY_COUNT} JSON key(s)"
          else
            echo "::notice::Secret is a plain string value"
          fi

          # Export for downstream steps (masked)
          echo "APP_SECRET=${SECRET_VALUE}" >> "$GITHUB_ENV"

      - name: Secret metadata audit
        run: |
          set -euo pipefail
          PROJECT_ID="${{ inputs.gcp_project_id }}"
          SECRET_NAME="${{ vars.GCP_SECRET_NAME }}"
          [[ -z "${SECRET_NAME:-}" ]] && exit 0

          echo "## Secret Manager Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Secret:** ${SECRET_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Project:** ${PROJECT_ID}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # List versions
          gcloud secrets versions list "$SECRET_NAME" \
            --project="$PROJECT_ID" \
            --format='table(name, state, createTime)' >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true

      - name: List secret versions (audit)
        run: |
          set -euo pipefail
          PROJECT_ID="${{ inputs.gcp_project_id }}"
          SECRET_NAME="${{ vars.GCP_SECRET_NAME }}"
          [[ -z "${SECRET_NAME:-}" ]] && exit 0

          # Show version history for rotation verification
          VERSION_COUNT=$(gcloud secrets versions list "$SECRET_NAME" \
            --project="$PROJECT_ID" \
            --format='value(name)' 2>/dev/null | wc -l | tr -d ' ')
          echo "::notice::Secret '${SECRET_NAME}' has ${VERSION_COUNT} version(s)"

  # ── Step 3: Cloud Storage access verification ────────────────────────
  storage-access:
    name: Verify Cloud Storage Access
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: gcp-auth
    environment: ${{ inputs.environment }}
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ inputs.gcp_project_id }}

      - name: List and verify GCS bucket access
        run: |
          set -euo pipefail
          PROJECT_ID="${{ inputs.gcp_project_id }}"

          # List buckets the service account has access to
          echo "Listing accessible GCS buckets..."
          BUCKETS=$(gcloud storage buckets list --project="$PROJECT_ID" \
            --format='value(name)' 2>/dev/null || true)

          if [[ -z "$BUCKETS" ]]; then
            echo "::notice::No GCS buckets accessible with current identity (this may be expected)"
            exit 0
          fi

          BUCKET_COUNT=$(echo "$BUCKETS" | wc -l | tr -d ' ')
          echo "::notice::Identity has access to ${BUCKET_COUNT} GCS bucket(s)"

          # Verify access to a specific bucket if configured
          TARGET_BUCKET="${{ vars.GCP_STORAGE_BUCKET }}"
          if [[ -n "${TARGET_BUCKET:-}" ]]; then
            if gcloud storage buckets describe "gs://${TARGET_BUCKET}" \
                --project="$PROJECT_ID" >/dev/null 2>&1; then
              echo "::notice::Verified access to bucket: gs://${TARGET_BUCKET}"

              # Count objects as a verification step
              OBJECT_COUNT=$(gcloud storage ls "gs://${TARGET_BUCKET}" \
                --project="$PROJECT_ID" 2>/dev/null | wc -l | tr -d ' ')
              echo "::notice::Bucket contains ${OBJECT_COUNT} top-level object(s)"
            else
              echo "::warning::Cannot access target bucket: gs://${TARGET_BUCKET}"
            fi
          fi

  # ── Step 4: Artifact Registry login ──────────────────────────────────
  artifact-registry:
    name: Artifact Registry Login
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: gcp-auth
    environment: ${{ inputs.environment }}
    steps:
      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ inputs.gcp_project_id }}

      - name: Login to Artifact Registry
        id: ar-login
        run: |
          set -euo pipefail
          AR_LOCATION="${{ vars.GCP_AR_LOCATION }}"
          PROJECT_ID="${{ inputs.gcp_project_id }}"

          if [[ -z "${AR_LOCATION:-}" ]]; then
            echo "::notice::GCP_AR_LOCATION not configured, skipping Artifact Registry login"
            echo "logged_in=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          AR_HOST="${AR_LOCATION}-docker.pkg.dev"

          # Configure Docker to use gcloud as a credential helper
          gcloud auth configure-docker "${AR_HOST}" --quiet 2>/dev/null || {
            echo "::error::Failed to configure Docker for Artifact Registry: ${AR_HOST}"
            exit 1
          }

          echo "::add-mask::${AR_HOST}"
          echo "ar_host=${AR_HOST}" >> "$GITHUB_OUTPUT"
          echo "logged_in=true" >> "$GITHUB_OUTPUT"
          echo "::notice::Logged in to Artifact Registry: ${AR_HOST}"

      - name: Verify Artifact Registry access
        if: steps.ar-login.outputs.logged_in == 'true'
        run: |
          set -euo pipefail
          PROJECT_ID="${{ inputs.gcp_project_id }}"
          AR_LOCATION="${{ vars.GCP_AR_LOCATION }}"
          AR_REPO="${{ vars.GCP_AR_REPOSITORY }}"

          # List repositories
          REPOS=$(gcloud artifacts repositories list \
            --project="$PROJECT_ID" \
            --location="$AR_LOCATION" \
            --format='value(name)' 2>/dev/null || true)

          if [[ -n "$REPOS" ]]; then
            REPO_COUNT=$(echo "$REPOS" | wc -l | tr -d ' ')
            echo "::notice::Artifact Registry access verified — ${REPO_COUNT} repositor(ies) accessible"
          else
            echo "::notice::No Artifact Registry repositories found"
          fi

          # List images in a specific repo if configured
          if [[ -n "${AR_REPO:-}" ]]; then
            IMAGE_COUNT=$(gcloud artifacts docker images list \
              "${AR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}" \
              --format='value(package)' 2>/dev/null | sort -u | wc -l | tr -d ' ')
            echo "::notice::Repository '${AR_REPO}' contains ${IMAGE_COUNT} image(s)"
          fi

      - name: Artifact Registry logout
        if: always() && steps.ar-login.outputs.logged_in == 'true'
        run: |
          AR_HOST="${{ steps.ar-login.outputs.ar_host }}"
          docker logout "${AR_HOST}" 2>/dev/null || true
          echo "::notice::Artifact Registry logout complete"

  # ── Step 5: GKE credential fetch ─────────────────────────────────────
  gke-creds:
    name: Fetch GKE Credentials
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: gcp-auth
    environment: ${{ inputs.environment }}
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ inputs.gcp_project_id }}

      - name: Install gke-gcloud-auth-plugin
        run: |
          set -euo pipefail
          gcloud components install gke-gcloud-auth-plugin --quiet 2>/dev/null || \
            sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin

      - name: Get GKE credentials
        id: gke-creds
        run: |
          set -euo pipefail
          CLUSTER_NAME="${{ vars.GKE_CLUSTER_NAME }}"
          CLUSTER_LOCATION="${{ vars.GKE_CLUSTER_LOCATION }}"
          PROJECT_ID="${{ inputs.gcp_project_id }}"

          if [[ -z "${CLUSTER_NAME:-}" || -z "${CLUSTER_LOCATION:-}" ]]; then
            echo "::notice::GKE_CLUSTER_NAME or GKE_CLUSTER_LOCATION not configured, skipping"
            exit 0
          fi

          # Fetch kubeconfig using OIDC-authenticated session
          gcloud container clusters get-credentials "$CLUSTER_NAME" \
            --location="$CLUSTER_LOCATION" \
            --project="$PROJECT_ID"

          echo "::notice::GKE credentials fetched for cluster '${CLUSTER_NAME}'"

      - name: Verify cluster access
        run: |
          set -euo pipefail
          CLUSTER_NAME="${{ vars.GKE_CLUSTER_NAME }}"
          [[ -z "${CLUSTER_NAME:-}" ]] && exit 0

          kubectl cluster-info 2>/dev/null || {
            echo "::warning::Cannot connect to GKE cluster"
            exit 0
          }

          SERVER_VERSION=$(kubectl version -o json 2>/dev/null | jq -r '.serverVersion.gitVersion' || echo 'unknown')
          NODE_COUNT=$(kubectl get nodes --no-headers 2>/dev/null | wc -l | tr -d ' ')
          echo "::notice::GKE cluster verified — version: ${SERVER_VERSION}, nodes: ${NODE_COUNT}"

      - name: Cleanup kubeconfig
        if: always()
        run: rm -f ~/.kube/config 2>/dev/null || true

  # ── Step 6: Cleanup ──────────────────────────────────────────────────
  cleanup:
    name: Cleanup GCP Session
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [gcp-auth, secret-manager, storage-access, artifact-registry, gke-creds]
    if: always()
    steps:
      - name: Revoke GCP credentials
        run: |
          set -euo pipefail
          # Revoke application default credentials
          gcloud auth revoke --all 2>/dev/null || true
          rm -rf ~/.config/gcloud/ 2>/dev/null || true
          rm -f ~/.kube/config 2>/dev/null || true

          # Clear Docker credential helpers
          rm -f ~/.docker/config.json 2>/dev/null || true

          echo "::notice::GCP session cleared — all cached credentials revoked"

      - name: Generate summary
        run: |
          echo "## GCP OIDC Workflow Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Environment:** ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Project:** ${{ inputs.gcp_project_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Service Account:** ${{ needs.gcp-auth.outputs.service_account }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Operation | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| OIDC Authentication | ${{ needs.gcp-auth.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Secret Manager Read | ${{ needs.secret-manager.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cloud Storage Access | ${{ needs.storage-access.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Artifact Registry | ${{ needs.artifact-registry.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GKE Credentials | ${{ needs.gke-creds.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Session Cleanup | completed |" >> "$GITHUB_STEP_SUMMARY"
