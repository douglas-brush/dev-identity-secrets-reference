# Complete example: GitHub Actions OIDC authentication to Google Cloud.
#
# Demonstrates:
# - OIDC workload identity federation — no service account keys
# - Secret Manager access
# - GKE credential fetch
#
# Prerequisites:
# - GCP Workload Identity Pool configured for GitHub Actions
# - Workload Identity Provider with attribute mapping for this repo
# - Service account with appropriate IAM roles

name: "Example: OIDC to GCP"

on:
  workflow_dispatch:
    inputs:
      gcp_project_id:
        description: GCP project ID
        required: true
        type: string
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - staging
          - production

permissions:
  id-token: write    # OIDC token request
  contents: read

concurrency:
  group: gcp-ops-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  # ── Step 1: Authenticate ──────────────────────────────────────────────
  gcp-auth:
    name: Authenticate to GCP
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: ${{ inputs.environment }}
    outputs:
      project_id: ${{ inputs.gcp_project_id }}
    steps:
      - name: Authenticate to Google Cloud via OIDC
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # Workload Identity Federation — no JSON key file needed
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_lifetime: 600s  # 10 minutes

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ inputs.gcp_project_id }}

      - name: Verify authentication
        run: |
          set -euo pipefail
          # Verify we're authenticated
          ACCOUNT=$(gcloud auth list --filter=status:ACTIVE --format='value(account)' 2>/dev/null)
          PROJECT=$(gcloud config get-value project 2>/dev/null)
          echo "::notice::Authenticated as ${ACCOUNT} in project ${PROJECT}"

  # ── Step 2: Secret Manager access ─────────────────────────────────────
  secret-manager:
    name: Read from Secret Manager
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: gcp-auth
    environment: ${{ inputs.environment }}
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ inputs.gcp_project_id }}

      - name: Read secret from Secret Manager
        id: read-secret
        run: |
          set -euo pipefail
          PROJECT_ID="${{ inputs.gcp_project_id }}"
          SECRET_NAME="${{ vars.GCP_SECRET_NAME }}"

          if [[ -z "${SECRET_NAME:-}" ]]; then
            echo "::notice::GCP_SECRET_NAME not configured, listing available secrets"
            SECRET_LIST=$(gcloud secrets list --project="$PROJECT_ID" \
              --format='value(name)' 2>/dev/null || true)

            if [[ -n "$SECRET_LIST" ]]; then
              SECRET_COUNT=$(echo "$SECRET_LIST" | wc -l | tr -d ' ')
              echo "::notice::Found ${SECRET_COUNT} secret(s) in project"
            else
              echo "::notice::No secrets found in project"
            fi
            exit 0
          fi

          # Read the latest version of the secret
          SECRET_VALUE=$(gcloud secrets versions access latest \
            --secret="$SECRET_NAME" \
            --project="$PROJECT_ID" 2>/dev/null) || {
              echo "::error::Failed to read secret: ${SECRET_NAME}"
              exit 1
            }

          # Mask the value in logs
          echo "::add-mask::${SECRET_VALUE}"
          echo "::notice::Secret '${SECRET_NAME}' read successfully"

          # Export for downstream steps
          echo "APP_SECRET=${SECRET_VALUE}" >> "$GITHUB_ENV"

      - name: Secret metadata audit
        run: |
          set -euo pipefail
          PROJECT_ID="${{ inputs.gcp_project_id }}"
          SECRET_NAME="${{ vars.GCP_SECRET_NAME }}"
          [[ -z "${SECRET_NAME:-}" ]] && exit 0

          echo "## Secret Manager Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Secret:** ${SECRET_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Project:** ${PROJECT_ID}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # List versions
          gcloud secrets versions list "$SECRET_NAME" \
            --project="$PROJECT_ID" \
            --format='table(name, state, createTime)' >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true

  # ── Step 3: GKE credential fetch ──────────────────────────────────────
  gke-creds:
    name: Fetch GKE Credentials
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: gcp-auth
    environment: ${{ inputs.environment }}
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ inputs.gcp_project_id }}

      - name: Install gke-gcloud-auth-plugin
        run: |
          set -euo pipefail
          gcloud components install gke-gcloud-auth-plugin --quiet 2>/dev/null || \
            sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin

      - name: Get GKE credentials
        id: gke-creds
        run: |
          set -euo pipefail
          CLUSTER_NAME="${{ vars.GKE_CLUSTER_NAME }}"
          CLUSTER_LOCATION="${{ vars.GKE_CLUSTER_LOCATION }}"
          PROJECT_ID="${{ inputs.gcp_project_id }}"

          if [[ -z "${CLUSTER_NAME:-}" || -z "${CLUSTER_LOCATION:-}" ]]; then
            echo "::notice::GKE_CLUSTER_NAME or GKE_CLUSTER_LOCATION not configured, skipping"
            exit 0
          fi

          # Fetch kubeconfig using OIDC-authenticated session
          gcloud container clusters get-credentials "$CLUSTER_NAME" \
            --location="$CLUSTER_LOCATION" \
            --project="$PROJECT_ID"

          echo "::notice::GKE credentials fetched for cluster '${CLUSTER_NAME}'"

      - name: Verify cluster access
        run: |
          set -euo pipefail
          CLUSTER_NAME="${{ vars.GKE_CLUSTER_NAME }}"
          [[ -z "${CLUSTER_NAME:-}" ]] && exit 0

          kubectl cluster-info 2>/dev/null || {
            echo "::warning::Cannot connect to GKE cluster"
            exit 0
          }

          SERVER_VERSION=$(kubectl version -o json 2>/dev/null | jq -r '.serverVersion.gitVersion' || echo 'unknown')
          NODE_COUNT=$(kubectl get nodes --no-headers 2>/dev/null | wc -l | tr -d ' ')
          echo "::notice::GKE cluster verified — version: ${SERVER_VERSION}, nodes: ${NODE_COUNT}"

      - name: Cleanup kubeconfig
        if: always()
        run: rm -f ~/.kube/config 2>/dev/null || true

  # ── Summary ───────────────────────────────────────────────────────────
  summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [gcp-auth, secret-manager, gke-creds]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## GCP OIDC Workflow Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Environment:** ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Project:** ${{ inputs.gcp_project_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Operation | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| OIDC Authentication | ${{ needs.gcp-auth.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Secret Manager Read | ${{ needs.secret-manager.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GKE Credentials | ${{ needs.gke-creds.result }} |" >> "$GITHUB_STEP_SUMMARY"
