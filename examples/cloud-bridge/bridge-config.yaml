# ---------------------------------------------------------------------------
# Multi-cloud sync strategy (documentation)
# ---------------------------------------------------------------------------
#
# When syncing the same secrets to multiple clouds, create separate mapping
# files per provider (aws-mappings.yaml, azure-mappings.yaml, gcp-mappings.yaml)
# or use this single file with the active mappings section uncommented for the
# target provider.
#
# Recommended sync order for multi-cloud:
#   1. Vault -> AWS  (vault-to-aws)
#   2. Vault -> Azure (vault-to-azure)
#   3. Vault -> GCP  (vault-to-gcp)
#
# This keeps Vault as the single source of truth and avoids circular sync
# conflicts. Only use bidirectional mode when a specific cloud provider is
# the authoritative source for certain secrets (e.g., AWS-native service
# credentials that are rotated by ASM).
