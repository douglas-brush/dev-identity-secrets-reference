# ---------------------------------------------------------------------------
# GCP Secret Manager mappings
# ---------------------------------------------------------------------------
# Used by: gcp-secret-manager-bridge.sh
#
# Additional fields:
#   gcp_name            GCP Secret Manager secret ID
#   labels              Key-value labels applied to the GCP secret resource
#   iam_conditions      IAM condition bindings for fine-grained access control

# Uncomment and use as the mappings section when running the GCP bridge:
