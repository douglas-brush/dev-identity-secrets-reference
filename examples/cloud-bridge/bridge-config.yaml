# bridge-config.yaml — Multi-cloud secrets bridge configuration
#
# This file defines sync mappings, conflict resolution policies, and
# notification webhooks for the cloud bridge scripts. Each cloud provider
# has its own mappings section with provider-specific options.
#
# Usage:
#   ./aws-secrets-manager-bridge.sh --mapping-file bridge-config.yaml --direction vault-to-aws
#   ./azure-keyvault-bridge.sh --mapping-file bridge-config.yaml --direction bidirectional
#   ./gcp-secret-manager-bridge.sh --mapping-file bridge-config.yaml --direction vault-to-gcp

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------

# Conflict resolution policy applied when both sides have been modified.
# Options: vault-wins (default), <provider>-wins, newest-wins
conflict_policy: vault-wins

# Vault KV v2 mount path (overridden by --vault-mount CLI flag)
vault_mount: secret

# Webhook for sync notifications (Slack-compatible JSON payload)
notify_webhook: ""

# ---------------------------------------------------------------------------
# AWS Secrets Manager mappings
# ---------------------------------------------------------------------------
# Used by: aws-secrets-manager-bridge.sh
#
# Fields:
#   vault_path      Vault KV v2 path (relative to mount, e.g., "myapp/db")
#   asm_name        AWS Secrets Manager secret name
#   sync            Enable/disable this mapping (default: true)
#   rotation_days   Configure ASM automatic rotation (requires Lambda ARN)

mappings:
  # ── Application database credentials ────────────────────────────────────
  - vault_path: "production/myapp/database"
    asm_name: "prod/myapp/db-credentials"
    sync: true
    rotation_days: 30

  - vault_path: "staging/myapp/database"
    asm_name: "staging/myapp/db-credentials"
    sync: true
    rotation_days: 90

  # ── API keys ────────────────────────────────────────────────────────────
  - vault_path: "production/myapp/api-keys"
    asm_name: "prod/myapp/api-keys"
    sync: true
    rotation_days: 0  # No automatic rotation

  # ── Service-to-service auth ─────────────────────────────────────────────
  - vault_path: "production/myapp/service-auth"
    asm_name: "prod/myapp/service-auth"
    sync: true
    rotation_days: 7

  # ── Disabled example (will be skipped) ──────────────────────────────────
  - vault_path: "legacy/old-app/credentials"
    asm_name: "legacy/old-app/credentials"
    sync: false

# ---------------------------------------------------------------------------
# Azure Key Vault mappings
# ---------------------------------------------------------------------------
# Used by: azure-keyvault-bridge.sh
#
# Additional fields:
#   akv_name        Azure Key Vault secret name (hyphens, not slashes)
#   content_type    MIME type stored in AKV metadata (default: application/json)
#   tags            Key-value metadata applied to the AKV secret

# Uncomment and use as the mappings section when running the Azure bridge:
#
# mappings:
#   - vault_path: "production/myapp/database"
#     akv_name: "myapp-database-credentials"
#     sync: true
