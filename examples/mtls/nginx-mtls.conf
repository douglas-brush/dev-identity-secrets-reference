# nginx mTLS Configuration
#
# This configuration enables mutual TLS on nginx — the server verifies
# client certificates and clients verify the server certificate. Suitable
# for API gateways, reverse proxies, and any nginx instance that needs
# to authenticate connecting services.
#
# Certificate paths assume Vault Agent or equivalent automation writes
# certificates to /etc/nginx/certs/ and reloads nginx on rotation.
#
# Usage:
#   1. Place Vault-issued certificates in /etc/nginx/certs/
#   2. Include this file in your nginx.conf: include /etc/nginx/conf.d/mtls.conf;
#   3. Reload: nginx -s reload
#
# Certificate files expected:
#   /etc/nginx/certs/server.pem         - Server certificate (leaf)
#   /etc/nginx/certs/server-key.pem     - Server private key
#   /etc/nginx/certs/ca-bundle.pem      - CA bundle for client cert verification
#   /etc/nginx/certs/ocsp-response.der  - OCSP stapling response (optional)

# ---------------------------------------------------------------------------
# Upstream — the backend application server
# ---------------------------------------------------------------------------
upstream backend {
    server 127.0.0.1:8080;

    # Health check and connection pooling
    keepalive 32;
    keepalive_timeout 60s;
}

# ---------------------------------------------------------------------------
# HTTPS server with mTLS
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.internal;

    # -------------------------------------------------------------------
    # Server certificate — proves the server's identity to clients
    # -------------------------------------------------------------------
    ssl_certificate         /etc/nginx/certs/server.pem;
    ssl_certificate_key     /etc/nginx/certs/server-key.pem;

    # -------------------------------------------------------------------
    # Client certificate verification — the "mutual" in mTLS
    #
    # ssl_verify_client: on     — require a valid client certificate
    #                    optional — request but don't require (useful for
    #                               mixed endpoints where some are public)
    #                    optional_no_ca — request cert but skip CA validation
    #                               (not recommended for production)
    # -------------------------------------------------------------------
    ssl_verify_client       on;

    # CA bundle used to verify client certificates. This should contain
    # the root CA and any intermediate CAs that signed client certs.
    ssl_client_certificate  /etc/nginx/certs/ca-bundle.pem;

    # Certificate chain depth — how many intermediate CAs are allowed
    # between the client cert and a trusted root. Set to the depth of
    # your PKI hierarchy (typically 2: root -> intermediate -> leaf).
    ssl_verify_depth        2;

    # -------------------------------------------------------------------
    # TLS protocol and cipher configuration
    # -------------------------------------------------------------------

    # Minimum TLS 1.2, prefer 1.3
    ssl_protocols TLSv1.2 TLSv1.3;

    # Cipher suites — server preference order. TLS 1.3 ciphers are
    # configured separately by OpenSSL and always preferred when available.
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;

    # ECDH curve for key exchange
    ssl_ecdh_curve X25519:secp384r1:secp256r1;

    # -------------------------------------------------------------------
    # SSL session caching — reduces handshake overhead for repeat clients
    # -------------------------------------------------------------------
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Disable session tickets — they bypass session cache security and
    # complicate forward secrecy. For mTLS between services, the
    # performance impact of full handshakes is negligible.
    ssl_session_tickets off;

    # -------------------------------------------------------------------
    # OCSP stapling — server fetches and caches OCSP responses so
    # clients don't need to contact the CA's OCSP responder directly.
    #
    # For short-lived Vault-issued certificates (< 24h TTL), OCSP
    # stapling is often unnecessary since certs expire before revocation
    # lists propagate. Enable it for longer-lived certificates.
    # -------------------------------------------------------------------
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Trusted CA for verifying OCSP responder signatures.
    # This is typically the same CA bundle used for client verification.
    ssl_trusted_certificate /etc/nginx/certs/ca-bundle.pem;

    # Optional: pre-loaded OCSP response file. Vault can generate this
    # if the PKI engine is configured with an OCSP responder URL.
    # Uncomment if using pre-fetched OCSP responses:
    # ssl_stapling_file /etc/nginx/certs/ocsp-response.der;

    # DNS resolver for OCSP responder lookups
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # -------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;

    # -------------------------------------------------------------------
    # Logging — include client certificate subject for audit trail
    # -------------------------------------------------------------------
    # Custom log format with client cert info (define in http block):
    #
    # log_format mtls '$remote_addr - $ssl_client_s_dn [$time_local] '
    #                 '"$request" $status $body_bytes_sent '
    #                 '"$ssl_client_serial" "$ssl_protocol/$ssl_cipher" '
    #                 '$request_time';
    #
    # access_log /var/log/nginx/mtls-access.log mtls;
    # error_log  /var/log/nginx/mtls-error.log warn;

    # -------------------------------------------------------------------
    # Proxy to backend — pass client certificate metadata as headers
    # -------------------------------------------------------------------
    location / {
        proxy_pass http://backend;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Client certificate metadata — allows the backend to make
        # authorization decisions based on the authenticated client identity
        # without handling TLS itself.
        proxy_set_header X-Client-Cert-Subject $ssl_client_s_dn;
        proxy_set_header X-Client-Cert-Issuer  $ssl_client_i_dn;
        proxy_set_header X-Client-Cert-Serial  $ssl_client_serial;
        proxy_set_header X-Client-Cert-Valid   $ssl_client_v_end;

        # $ssl_client_verify is "SUCCESS" when the client cert is valid.
        # The backend can check this header as an additional safeguard.
        proxy_set_header X-Client-Cert-Verify  $ssl_client_verify;

        # Connection pooling to backend
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # -------------------------------------------------------------------
    # Health check endpoint — exempted from client cert requirement
    #
    # Load balancers and monitoring systems typically cannot present
    # client certificates. This location block allows unauthenticated
    # health checks on a specific path.
    #
    # IMPORTANT: Only expose a minimal health endpoint here. Do not
    # exempt application paths from mTLS.
    # -------------------------------------------------------------------
    location = /healthz {
        # Override the server-level client cert requirement
        # "optional" means: accept a cert if presented, but don't require one
        # Note: This requires nginx 1.21.4+ for per-location ssl_verify_client.
        # For older versions, use a separate server block on a different port.
        #
        # ssl_verify_client optional;

        proxy_pass http://backend/healthz;
        proxy_set_header Host $host;

        # Rate limit health checks
        limit_req zone=healthz burst=5 nodelay;
    }
}

# ---------------------------------------------------------------------------
# Rate limit zone for health checks (define in http block)
# ---------------------------------------------------------------------------
# limit_req_zone $binary_remote_addr zone=healthz:1m rate=10r/s;

# ---------------------------------------------------------------------------
# Certificate rotation with nginx
# ---------------------------------------------------------------------------
#
# nginx does not auto-reload certificates. After Vault Agent writes new
# certificates to disk, nginx must be told to reload:
#
#   nginx -s reload
#
# This performs a graceful reload — existing connections finish while new
# connections use the updated certificates. No downtime.
#
# Vault Agent template example:
#
#   template {
#     source      = "/etc/vault-agent/templates/server.pem.tpl"
#     destination = "/etc/nginx/certs/server.pem"
#     perms       = "0644"
#     command     = "nginx -s reload"
#   }
#
#   template {
#     source      = "/etc/vault-agent/templates/server-key.pem.tpl"
#     destination = "/etc/nginx/certs/server-key.pem"
#     perms       = "0600"
#     command     = "nginx -s reload"
#   }
#
# The command runs after the template is rendered. Vault Agent deduplicates
# the reload if multiple templates change in the same cycle.
