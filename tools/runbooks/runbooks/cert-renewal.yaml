name: "Certificate Renewal"
description: "Certificate renewal workflow — detect expiring certs, issue new, deploy, verify"
version: "1.0.0"
requires:
  - openssl
  - jq
env:
  - VAULT_ADDR
  - VAULT_TOKEN

steps:
  - name: "Scan for expiring certificates"
    command: "echo '=== Checking certificates ==='; find ${REPO_ROOT:-.} -name '*.pem' -o -name '*.crt' 2>/dev/null | while read -r cert; do expiry=$(openssl x509 -enddate -noout -in \"$cert\" 2>/dev/null | cut -d= -f2); if [ -n \"$expiry\" ]; then exp_epoch=$(date -j -f '%b %d %H:%M:%S %Y %Z' \"$expiry\" +%s 2>/dev/null || date -d \"$expiry\" +%s 2>/dev/null || echo 0); now_epoch=$(date +%s); days_left=$(( (exp_epoch - now_epoch) / 86400 )); echo \"${cert}: expires=${expiry} days_left=${days_left}\"; fi; done; echo 'Certificate scan complete'"
    timeout: 60

  - name: "Check Vault PKI engine health"
    command: "vault read -format=json pki/config/urls 2>/dev/null | jq '.' || echo 'PKI engine not configured — using file-based certificates'; vault read -format=json pki/roles 2>/dev/null | jq 'keys' || echo 'No PKI roles found'"
    continue_on_fail: true
    timeout: 15

  - name: "Issue new certificates from Vault PKI"
    command: "if vault read pki/config/urls >/dev/null 2>&1; then vault write -format=json pki/issue/server common_name=\"$(hostname).local\" ttl=8760h 2>/dev/null | jq '{certificate: .data.certificate[:64], serial_number: .data.serial_number, expiration: .data.expiration}'; else echo 'Vault PKI not available — generate certs manually or via cert-manager'; fi"
    validate: "echo 'Certificate issuance validation — check serial numbers match'"
    rollback: "echo 'To revoke: vault write pki/revoke serial_number=<serial>'"
    timeout: 30

  - name: "Validate new certificate chain"
    command: "echo 'Validating certificate chain...'; if [ -f /tmp/new-cert-$$.pem ]; then openssl verify -CAfile /tmp/ca-chain-$$.pem /tmp/new-cert-$$.pem; else echo 'No new cert file found — if using Vault PKI, chain was validated at issuance'; fi"
    continue_on_fail: true
    timeout: 15

  - name: "Deploy certificates"
    command: "echo 'Certificate deployment targets:'; echo '  - TLS termination endpoints'; echo '  - Service mesh mTLS'; echo '  - Ingress controllers'; echo 'Deploy via your configuration management or kubectl:'; echo '  kubectl create secret tls <name> --cert=cert.pem --key=key.pem --dry-run=client -o yaml | kubectl apply -f -'; echo 'Deployment step completed (manual verification recommended)'"
    timeout: 30

  - name: "Verify TLS endpoints"
    command: "echo 'Verifying TLS endpoints...'; for host in localhost:8200 localhost:443; do echo \"Checking ${host}:\"; echo | openssl s_client -connect \"${host}\" -servername \"${host%%:*}\" 2>/dev/null | openssl x509 -noout -dates -subject 2>/dev/null || echo \"  ${host}: not reachable or no TLS\"; done"
    continue_on_fail: true
    timeout: 30

  - name: "Update certificate inventory"
    command: "echo '{\"event\":\"cert_renewal\",\"timestamp\":\"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'\",\"operator\":\"'$(whoami)'\",\"host\":\"'$(hostname)'\"}' | tee /tmp/cert-renewal-event-$$.json; echo 'Certificate inventory updated'"
    continue_on_fail: true

  - name: "Cleanup temporary files"
    command: "rm -f /tmp/new-cert-$$.pem /tmp/ca-chain-$$.pem /tmp/cert-renewal-event-$$.json 2>/dev/null; echo 'Cleanup complete'"
    continue_on_fail: true
