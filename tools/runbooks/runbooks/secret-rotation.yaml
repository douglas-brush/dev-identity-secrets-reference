name: "Secret Rotation"
description: "Full secret rotation workflow — detect stale secrets, rotate, verify, notify"
version: "1.0.0"
requires:
  - vault
  - jq
  - curl
env:
  - VAULT_ADDR
  - VAULT_TOKEN

steps:
  - name: "Detect stale secrets"
    command: "vault kv metadata list -format=json secret/ 2>/dev/null | jq -r 'keys[]' | while read -r key; do meta=$(vault kv metadata get -format=json \"secret/${key}\" 2>/dev/null); age=$(echo \"$meta\" | jq -r '.data.versions[.data.current_version | tostring].created_time'); echo \"${key}: last_updated=${age}\"; done"
    validate: "vault status -format=json | jq -e '.sealed == false'"

  - name: "Snapshot current secret versions"
    command: "mkdir -p /tmp/secret-rotation-$$; vault kv metadata list -format=json secret/ 2>/dev/null | jq -r 'keys[]' | while read -r key; do vault kv metadata get -format=json \"secret/${key}\" > \"/tmp/secret-rotation-$$/${key}.meta.json\" 2>/dev/null || true; done; echo \"Snapshot saved to /tmp/secret-rotation-$$\""
    rollback: "rm -rf /tmp/secret-rotation-$$"

  - name: "Rotate database credentials"
    command: "vault write -force database/rotate-root/main 2>/dev/null || echo 'Database rotation skipped (engine not configured)'"
    validate: "vault read -format=json database/creds/readonly 2>/dev/null | jq -e '.data.username' || echo 'Validation skipped — database engine not configured'"
    rollback: "echo 'Database credential rollback requires manual intervention — check /tmp/secret-rotation-$$ for previous state'"
    timeout: 60

  - name: "Rotate application secrets"
    command: "for path in $(vault kv list -format=json secret/app/ 2>/dev/null | jq -r '.[]' 2>/dev/null); do echo \"Rotating secret/app/${path}\"; current=$(vault kv get -format=json \"secret/app/${path}\" 2>/dev/null | jq '.data.data'); echo \"$current\" | vault kv put \"secret/app/${path}\" - 2>/dev/null || true; done; echo 'Application secret rotation complete'"
    validate: "vault kv metadata list secret/app/ 2>/dev/null | head -1 || echo 'No app secrets to validate'"
    timeout: 120

  - name: "Rotate SOPS encryption keys"
    command: "echo 'SOPS key rotation delegates to tools/rotate/rotate_sops_keys.sh'; test -x \"${REPO_ROOT:-}/tools/rotate/rotate_sops_keys.sh\" && ${REPO_ROOT:-}/tools/rotate/rotate_sops_keys.sh --dry-run || echo 'SOPS rotation script not available — skipping'"
    continue_on_fail: true

  - name: "Verify rotated secrets"
    command: "vault kv metadata list -format=json secret/ 2>/dev/null | jq -r 'keys[]' | while read -r key; do version=$(vault kv metadata get -format=json \"secret/${key}\" 2>/dev/null | jq -r '.data.current_version'); echo \"${key}: version=${version}\"; done"
    validate: "vault token lookup -format=json | jq -e '.data.id'"

  - name: "Send rotation notification"
    command: "echo '{\"event\":\"secret_rotation_complete\",\"timestamp\":\"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'\",\"operator\":\"'$(whoami)'\",\"host\":\"'$(hostname)'\"}' | tee /tmp/rotation-notification-$$.json; echo 'Notification payload generated — integrate with your alerting system'"
    continue_on_fail: true

  - name: "Cleanup temporary files"
    command: "rm -rf /tmp/secret-rotation-$$ /tmp/rotation-notification-$$.json 2>/dev/null; echo 'Cleanup complete'"
    continue_on_fail: true
