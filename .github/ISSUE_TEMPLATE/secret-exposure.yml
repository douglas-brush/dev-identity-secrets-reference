name: Secret Exposure Report
description: Report a potentially exposed secret or credential
labels: ["security", "secret-exposure", "priority:critical"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Secret Exposure Report
        Use this template to report a discovered secret exposure.
        **Do NOT include the actual secret value in this issue.**
  - type: dropdown
    id: secret-type
    attributes:
      label: Type of secret exposed
      options:
        - API Key / Token
        - Database Credential
        - Cloud Access Key (AWS/Azure/GCP)
        - Private Key / Certificate
        - OAuth Client Secret
        - SSH Key
        - Service Account Credential
        - Other
    validations:
      required: true
  - type: dropdown
    id: exposure-location
    attributes:
      label: Where was the secret found?
      options:
        - Git repository (committed)
        - CI/CD logs
        - Container image
        - Public artifact / package
        - Cloud storage (S3/Blob/GCS)
        - Shared document / wiki
        - Slack / messaging
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Describe where and how the exposure was discovered (file path, commit hash, etc.)
    validations:
      required: true
  - type: dropdown
    id: rotated
    attributes:
      label: Has the secret been rotated?
      options:
        - "Yes"
        - "No"
        - "In progress"
    validations:
      required: true
  - type: textarea
    id: blast-radius
    attributes:
      label: Estimated blast radius
      description: What systems or data could be accessed with this secret?
