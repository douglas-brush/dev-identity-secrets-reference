# Enhanced secret scanning workflow.
# Runs gitleaks with custom config, entropy analysis, and plaintext pattern checks.
# Posts findings as PR annotations and generates SARIF for GitHub Security tab.

name: Enhanced Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── gitleaks with custom config ──────────────────────────────────
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: tools/scanning/custom-gitleaks.toml
        with:
          args: >-
            detect
            --source .
            --report-format sarif
            --report-path gitleaks-results.sarif
            --baseline-path .gitleaks-baseline.json
            --exit-code 0
        continue-on-error: true

      # ── Upload SARIF to GitHub Security tab ──────────────────────────
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks
        continue-on-error: true

      # ── Plaintext pattern scan ───────────────────────────────────────
      - name: Plaintext pattern scan
        id: plaintext
        run: |
          chmod +x bootstrap/scripts/check_no_plaintext_secrets.sh
          if ! ./bootstrap/scripts/check_no_plaintext_secrets.sh text; then
            echo "plaintext_findings=true" >> "$GITHUB_OUTPUT"
          else
            echo "plaintext_findings=false" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      # ── Entropy analysis ─────────────────────────────────────────────
      - name: Entropy analysis
        id: entropy
        run: |
          chmod +x tools/scanning/entropy_check.sh
          if ! ./tools/scanning/entropy_check.sh --threshold 4.5 --format text; then
            echo "entropy_findings=true" >> "$GITHUB_OUTPUT"
          else
            echo "entropy_findings=false" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      # ── File permission check (informational) ───────────────────────
      - name: Check private key permissions
        run: |
          echo "## Private Key Permission Audit" >> "$GITHUB_STEP_SUMMARY"
          found=0
          while IFS= read -r -d '' f; do
            perms=$(stat -c '%a' "$f" 2>/dev/null || echo "unknown")
            if [[ "$perms" != "600" ]] && [[ "$perms" != "400" ]]; then
              echo "::warning file=${f}::Private key has permissions ${perms} (expected 600 or 400)"
              echo "- \`${f}\`: ${perms} (should be 600/400)" >> "$GITHUB_STEP_SUMMARY"
              found=1
            fi
          done < <(find . -type f \( -name "*.pem" -o -name "*.key" -o -name "*.p12" -o -name "*.pfx" \) -not -path './.git/*' -print0 2>/dev/null)
          if [[ $found -eq 0 ]]; then
            echo "No private key permission issues found." >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── .env file check ─────────────────────────────────────────────
      - name: Check .env files
        run: |
          echo "## .env File Audit" >> "$GITHUB_STEP_SUMMARY"
          found=0
          while IFS= read -r -d '' f; do
            if ! git check-ignore -q "$f" 2>/dev/null; then
              echo "::error file=${f}::.env file is not gitignored — secrets may leak"
              echo "- \`${f}\`: NOT gitignored" >> "$GITHUB_STEP_SUMMARY"
              found=1
            fi
          done < <(find . -name ".env" -o -name ".env.local" -o -name ".env.production" | tr '\n' '\0' 2>/dev/null)
          if [[ $found -eq 0 ]]; then
            echo "No .env file issues found." >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── Consolidated scan with CI annotations ───────────────────────
      - name: Run consolidated scanner (CI mode)
        if: always()
        run: |
          chmod +x tools/scanning/scan_repo.sh
          tools/scanning/scan_repo.sh --ci --threshold 4.5 || true

      # ── Fail gate: block PR if new secrets detected ─────────────────
      - name: Evaluate findings
        if: always()
        run: |
          failed=0

          # Check gitleaks SARIF for results
          if [[ -f gitleaks-results.sarif ]]; then
            count=$(python3 -c "
          import json
          with open('gitleaks-results.sarif') as f:
              d = json.load(f)
          total = sum(len(r.get('results',[])) for r in d.get('runs',[]))
          print(total)
          " 2>/dev/null || echo "0")
            if [[ "$count" -gt 0 ]]; then
              echo "::error::gitleaks detected $count finding(s)"
              failed=1
            fi
          fi

          # Check plaintext scan
          if [[ "${{ steps.plaintext.outputs.plaintext_findings }}" == "true" ]]; then
            echo "::error::Plaintext pattern scan detected secrets"
            failed=1
          fi

          # Check entropy scan
          if [[ "${{ steps.entropy.outputs.entropy_findings }}" == "true" ]]; then
            echo "::warning::Entropy scan detected high-entropy strings (review recommended)"
            # Entropy is a warning, not a hard fail — too many false positives
          fi

          if [[ $failed -ne 0 ]]; then
            echo ""
            echo "Secret scan FAILED. Fix findings or update baseline:"
            echo "  gitleaks detect --baseline-path .gitleaks-baseline.json --report-path .gitleaks-baseline.json"
            echo "  Add false positives to .secretsignore"
            exit 1
          fi

          echo "All secret scans passed."
