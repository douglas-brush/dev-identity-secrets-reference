# Validates Terraform modules on every PR and push to main.
# Runs fmt check and validate across all modules using a matrix strategy.

name: "Terraform: Validate"

on:
  push:
    branches: [main]
    paths:
      - '**/*.tf'
      - '.github/workflows/terraform-validate.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.tf'
      - '.github/workflows/terraform-validate.yml'

permissions:
  contents: read

concurrency:
  group: terraform-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Global format check across all modules ──────────────────────────────
  fmt-check:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Check formatting (all .tf files)
        run: |
          set -euo pipefail
          TF_DIRS=$(find . -name '*.tf' -not -path '*/.terraform/*' -not -path '*/.git/*' \
            -exec dirname {} \; | sort -u)

          if [[ -z "$TF_DIRS" ]]; then
            echo "::notice::No Terraform files found"
            exit 0
          fi

          ERRORS=0
          for dir in $TF_DIRS; do
            echo "Checking format: ${dir}"
            if ! terraform fmt -check -diff "$dir" 2>/dev/null; then
              ERRORS=$((ERRORS + 1))
              echo "::error::Formatting issues in ${dir}"
            fi
          done

          if [[ "$ERRORS" -gt 0 ]]; then
            echo "::error::${ERRORS} director(ies) have formatting issues. Run 'terraform fmt -recursive' to fix."
            exit 1
          fi

          echo "::notice::All Terraform files are properly formatted"

  # ── Per-module validation ───────────────────────────────────────────────
  validate:
    name: "Validate: ${{ matrix.module }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: fmt-check
    strategy:
      fail-fast: false
      matrix:
        module:
          - aws-kms-oidc
          - azure-keyvault-oidc
          - gcp-kms-oidc
          - vault-setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init (no backend)
        working-directory: platform/terraform/modules/${{ matrix.module }}
        run: |
          set -euo pipefail
          terraform init -backend=false -input=false
          echo "::notice::Initialized module '${{ matrix.module }}'"

      - name: Terraform validate
        id: validate
        working-directory: platform/terraform/modules/${{ matrix.module }}
        run: |
          set -euo pipefail
          OUTPUT=$(terraform validate -json 2>&1)
          VALID=$(echo "$OUTPUT" | jq -r '.valid')
          ERROR_COUNT=$(echo "$OUTPUT" | jq '.diagnostics | length')

          echo "valid=${VALID}" >> "$GITHUB_OUTPUT"
          echo "error_count=${ERROR_COUNT}" >> "$GITHUB_OUTPUT"

          if [[ "$VALID" != "true" ]]; then
            echo "$OUTPUT" | jq -r '.diagnostics[] | "::error file=\(.range.filename // "unknown"),line=\(.range.start.line // 0)::\(.severity): \(.summary) — \(.detail)"'
            echo "::error::Module '${{ matrix.module }}' failed validation with ${ERROR_COUNT} error(s)"
            exit 1
          fi

          echo "::notice::Module '${{ matrix.module }}' is valid"

  # ── Summary ─────────────────────────────────────────────────────────────
  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [fmt-check, validate]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Terraform Validation Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Format Check | ${{ needs.fmt-check.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Module Validation | ${{ needs.validate.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Modules Validated" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Module | Path |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| aws-kms-oidc | \`platform/terraform/modules/aws-kms-oidc\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| azure-keyvault-oidc | \`platform/terraform/modules/azure-keyvault-oidc\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| gcp-kms-oidc | \`platform/terraform/modules/gcp-kms-oidc\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| vault-setup | \`platform/terraform/modules/vault-setup\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any check failed
        if: >-
          needs.fmt-check.result == 'failure' ||
          needs.validate.result == 'failure'
        run: exit 1
