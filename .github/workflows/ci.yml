name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python SDK
    uses: ./.github/workflows/test-python.yml
    permissions:
      contents: read

  go:
    name: Go SDK
    uses: ./.github/workflows/test-go.yml
    permissions:
      contents: read

  typescript:
    name: TypeScript SDK
    uses: ./.github/workflows/test-typescript.yml
    permissions:
      contents: read

  shell:
    name: Shell Tooling
    uses: ./.github/workflows/test-shell.yml
    permissions:
      contents: read

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [python, go, typescript, shell]
    steps:
      - name: Check results
        run: |
          echo "## CI Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Suite | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Python SDK | ${{ needs.python.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Go SDK | ${{ needs.go.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| TypeScript SDK | ${{ needs.typescript.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Shell Tooling | ${{ needs.shell.result }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Gate on all results
        if: >-
          needs.python.result == 'failure' ||
          needs.go.result == 'failure' ||
          needs.typescript.result == 'failure' ||
          needs.shell.result == 'failure'
        run: |
          echo "One or more test suites failed."
          exit 1

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              'Python SDK': '${{ needs.python.result }}',
              'Go SDK': '${{ needs.go.result }}',
              'TypeScript SDK': '${{ needs.typescript.result }}',
              'Shell Tooling': '${{ needs.shell.result }}'
            };
            const icon = (s) => s === 'success' ? '✅' : s === 'failure' ? '❌' : '⚠️';
            const rows = Object.entries(results)
              .map(([name, status]) => `| ${name} | ${icon(status)} ${status} |`)
              .join('\n');
            const body = `## CI Results\n\n| Suite | Status |\n|-------|--------|\n${rows}\n\n*Run: [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`;

            // Find and update existing comment or create new
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const existing = comments.find(c => c.body.startsWith('## CI Results'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
