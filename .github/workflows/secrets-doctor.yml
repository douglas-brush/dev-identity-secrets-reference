# Weekly scheduled workflow that runs the secrets-doctor tool
# to audit secret hygiene across the repository.
# Creates GitHub issues for critical findings.

name: "Scheduled: Secrets Doctor"

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      create_issues:
        description: Create GitHub issues for critical findings
        type: boolean
        default: true
      severity_threshold:
        description: "Minimum severity to report: critical, high, medium, low"
        type: choice
        options:
          - critical
          - high
          - medium
          - low
        default: high

permissions:
  contents: read
  issues: write
  security-events: write

concurrency:
  group: secrets-doctor
  cancel-in-progress: false

jobs:
  audit:
    name: Run Secrets Doctor
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for age-based checks

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          set -euo pipefail
          pip install pyyaml

          # Install gitleaks for scanning
          GITLEAKS_VERSION="8.18.4"
          curl -fsSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_amd64.tar.gz"
          tar xzf /tmp/gitleaks.tar.gz -C /tmp/
          sudo mv /tmp/gitleaks /usr/local/bin/

          # Install SOPS for encryption validation
          SOPS_VERSION="3.9.0"
          curl -fsSL -o /tmp/sops \
            "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
          chmod +x /tmp/sops
          sudo mv /tmp/sops /usr/local/bin/

      - name: Run secrets audit
        id: audit
        run: |
          set -euo pipefail

          REPORT_FILE="secrets-doctor-report.json"
          SEVERITY="${{ inputs.severity_threshold || 'high' }}"
          FINDINGS=()
          CRITICAL_COUNT=0
          HIGH_COUNT=0
          MEDIUM_COUNT=0
          LOW_COUNT=0

          # ── Check 1: Gitleaks full repo scan ────────────────────────
          echo "::group::Gitleaks full scan"
          gitleaks detect --report-format=json --report-path=/tmp/gitleaks.json \
            --exit-code=0 2>&1 || true

          if [[ -f /tmp/gitleaks.json ]]; then
            GL_COUNT=$(jq 'length' /tmp/gitleaks.json)
            if [[ "$GL_COUNT" -gt 0 ]]; then
              CRITICAL_COUNT=$((CRITICAL_COUNT + GL_COUNT))
              echo "::error::Gitleaks found ${GL_COUNT} secret(s) in repository history"
            fi
          fi
          echo "::endgroup::"

          # ── Check 2: Unencrypted files in secrets directories ───────
          echo "::group::SOPS encryption check"
          UNENCRYPTED=0
          for file in $(find . -path '*/secrets/*.yaml' -o -path '*/secrets/*.yml' \
                        -o -path '*/secrets/*.json' 2>/dev/null | \
                        grep -v node_modules | grep -v .git); do
            if ! grep -q 'sops:' "$file" 2>/dev/null && \
               ! grep -q '"sops"' "$file" 2>/dev/null; then
              echo "::warning file=${file}::Unencrypted secret file"
              UNENCRYPTED=$((UNENCRYPTED + 1))
            fi
          done
          HIGH_COUNT=$((HIGH_COUNT + UNENCRYPTED))
          echo "::endgroup::"

          # ── Check 3: .env files committed ───────────────────────────
          echo "::group::.env file check"
          ENV_FILES=$(git ls-files | grep -E '\.env$|\.env\.' | grep -v '.env.example' || true)
          if [[ -n "$ENV_FILES" ]]; then
            ENV_COUNT=$(echo "$ENV_FILES" | wc -l | tr -d ' ')
            CRITICAL_COUNT=$((CRITICAL_COUNT + ENV_COUNT))
            echo "::error::Found ${ENV_COUNT} .env file(s) committed to the repository"
            echo "$ENV_FILES"
          fi
          echo "::endgroup::"

          # ── Check 4: Hardcoded credentials in config files ──────────
          echo "::group::Hardcoded credential check"
          CONFIG_FILES=$(find . \( -name '*.conf' -o -name '*.cfg' -o -name '*.ini' \
            -o -name '*.properties' -o -name '*.toml' \) \
            -not -path '*/.git/*' -not -path '*/node_modules/*' 2>/dev/null || true)

          HARDCODED=0
          if [[ -n "$CONFIG_FILES" ]]; then
            while IFS= read -r file; do
              [[ -z "$file" ]] && continue
              if grep -qPi '(password|secret|token|api_key)\s*[=:]\s*["\x27]?[A-Za-z0-9_\-]{8,}' "$file" 2>/dev/null; then
                echo "::warning file=${file}::Possible hardcoded credential"
                HARDCODED=$((HARDCODED + 1))
              fi
            done <<< "$CONFIG_FILES"
          fi
          MEDIUM_COUNT=$((MEDIUM_COUNT + HARDCODED))
          echo "::endgroup::"

          # ── Check 5: .gitignore completeness ────────────────────────
          echo "::group::.gitignore check"
          GITIGNORE_ISSUES=0
          if [[ -f .gitignore ]]; then
            EXPECTED_PATTERNS=('.env' '*.pem' '*.key' '*.p12' '*.pfx' '*.jks' 'credentials.json')
            for pattern in "${EXPECTED_PATTERNS[@]}"; do
              if ! grep -qF "$pattern" .gitignore 2>/dev/null; then
                echo "::warning::.gitignore missing pattern: ${pattern}"
                GITIGNORE_ISSUES=$((GITIGNORE_ISSUES + 1))
              fi
            done
          else
            echo "::warning::No .gitignore file found"
            GITIGNORE_ISSUES=5
          fi
          LOW_COUNT=$((LOW_COUNT + GITIGNORE_ISSUES))
          echo "::endgroup::"

          # ── Check 6: Certificate and key files ──────────────────────
          echo "::group::Certificate/key file check"
          KEY_FILES=$(git ls-files | grep -E '\.(pem|key|p12|pfx|jks|keystore)$' || true)
          if [[ -n "$KEY_FILES" ]]; then
            KEY_COUNT=$(echo "$KEY_FILES" | wc -l | tr -d ' ')
            CRITICAL_COUNT=$((CRITICAL_COUNT + KEY_COUNT))
            echo "::error::Found ${KEY_COUNT} certificate/key file(s) committed"
            echo "$KEY_FILES"
          fi
          echo "::endgroup::"

          # ── Generate report ─────────────────────────────────────────
          TOTAL=$((CRITICAL_COUNT + HIGH_COUNT + MEDIUM_COUNT + LOW_COUNT))

          cat > "$REPORT_FILE" << REPORT_EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "repository": "${{ github.repository }}",
            "ref": "${{ github.sha }}",
            "summary": {
              "total": ${TOTAL},
              "critical": ${CRITICAL_COUNT},
              "high": ${HIGH_COUNT},
              "medium": ${MEDIUM_COUNT},
              "low": ${LOW_COUNT}
            }
          }
          REPORT_EOF

          echo "total=${TOTAL}" >> "$GITHUB_OUTPUT"
          echo "critical=${CRITICAL_COUNT}" >> "$GITHUB_OUTPUT"
          echo "high=${HIGH_COUNT}" >> "$GITHUB_OUTPUT"
          echo "medium=${MEDIUM_COUNT}" >> "$GITHUB_OUTPUT"
          echo "low=${LOW_COUNT}" >> "$GITHUB_OUTPUT"

          # Step summary
          echo "## Secrets Doctor Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Scan date:** $(date -u +%Y-%m-%d)" >> "$GITHUB_STEP_SUMMARY"
          echo "**Repository:** ${{ github.repository }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Severity | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Critical | ${CRITICAL_COUNT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| High | ${HIGH_COUNT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Medium | ${MEDIUM_COUNT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Low | ${LOW_COUNT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Total** | **${TOTAL}** |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secrets-doctor-report
          path: |
            secrets-doctor-report.json
            /tmp/gitleaks.json
          retention-days: 90

      - name: Create issue for critical findings
        if: >-
          (inputs.create_issues == true || inputs.create_issues == '') &&
          steps.audit.outputs.critical != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const critical = ${{ steps.audit.outputs.critical }};
            const high = ${{ steps.audit.outputs.high }};
            const medium = ${{ steps.audit.outputs.medium }};
            const low = ${{ steps.audit.outputs.low }};
            const total = ${{ steps.audit.outputs.total }};

            const today = new Date().toISOString().split('T')[0];

            const body = `## Secrets Doctor Report — ${today}

            The weekly secrets audit found **${total}** issue(s) requiring attention.

            | Severity | Count |
            |----------|-------|
            | Critical | ${critical} |
            | High | ${high} |
            | Medium | ${medium} |
            | Low | ${low} |

            ### Next Steps

            1. Review the [workflow run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) for detailed findings
            2. Rotate any exposed credentials immediately
            3. Remove committed secrets from git history using \`git filter-repo\`
            4. Encrypt secret files with SOPS before committing
            5. Update \`.gitignore\` to prevent future leaks

            > This issue was auto-generated by the Secrets Doctor workflow.`;

            // Check for existing open issue to avoid duplicates
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'secrets-audit',
              state: 'open'
            });

            if (existingIssues.data.length > 0) {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssues.data[0].number,
                body: body
              });
              console.log(`Updated existing issue #${existingIssues.data[0].number}`);
            } else {
              // Create new issue
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Secrets Doctor] ${critical} critical finding(s) detected — ${today}`,
                body: body,
                labels: ['secrets-audit', 'security', 'critical']
              });
              console.log(`Created issue #${issue.data.number}`);
            }
