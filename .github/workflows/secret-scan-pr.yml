# Runs on every pull request to detect leaked secrets before merge.
# Blocks the PR if any secrets are found.

name: "PR: Secret Scan"

on:
  pull_request:
    branches: [main, master, develop]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  security-events: write
  pull-requests: write   # For PR comments

concurrency:
  group: secret-scan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  scan:
    name: Scan for secrets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      # ── Gitleaks on PR diff ────────────────────────────────────────────
      - name: Run gitleaks on PR diff
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: >-
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
            --report-format=sarif
            --report-path=gitleaks-report.sarif
            --exit-code=0
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Count gitleaks findings
        id: gitleaks-count
        run: |
          set -euo pipefail
          if [[ -f gitleaks-report.sarif ]]; then
            COUNT=$(jq '[.runs[].results[]] | length' gitleaks-report.sarif)
          else
            COUNT=0
          fi
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"

      # ── Plaintext secret pattern check ─────────────────────────────────
      - name: Check for plaintext secrets in changed files
        id: patterns
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          FINDING_COUNT=0

          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR "${BASE_SHA}..${HEAD_SHA}" | \
            grep -vE '\.(png|jpg|gif|ico|woff|ttf|eot|lock)$' | \
            grep -vE '(node_modules/|vendor/|\.git/)' || true)

          if [[ -z "$CHANGED_FILES" ]]; then
            echo "::notice::No text files changed in this PR"
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PATTERNS=(
            'AKIA[0-9A-Z]{16}'
            'ghp_[A-Za-z0-9]{36}'
            'github_pat_[A-Za-z0-9_]{82}'
            'xox[bpors]-[0-9a-zA-Z-]{10,}'
            '-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'
            'hvs\.[A-Za-z0-9]{24,}'
            'sk-[A-Za-z0-9]{48}'
          )

          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(echo "$CHANGED_FILES" | xargs grep -lPn "$pattern" 2>/dev/null || true)
            if [[ -n "$MATCHES" ]]; then
              MATCH_COUNT=$(echo "$MATCHES" | wc -l | tr -d ' ')
              FINDING_COUNT=$((FINDING_COUNT + MATCH_COUNT))
              echo "::warning::Secret pattern detected in ${MATCH_COUNT} file(s)"
            fi
          done

          echo "count=${FINDING_COUNT}" >> "$GITHUB_OUTPUT"

      # ── SOPS encryption validation ─────────────────────────────────────
      - name: Validate SOPS encryption on secret files
        id: sops
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          FINDING_COUNT=0

          # Check if any files in secrets/ directories were changed
          SECRET_FILES=$(git diff --name-only --diff-filter=ACMR "${BASE_SHA}..${HEAD_SHA}" | \
            grep -E '^secrets/' || true)

          if [[ -z "$SECRET_FILES" ]]; then
            echo "::notice::No secret files changed"
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          while IFS= read -r file; do
            [[ -z "$file" || ! -f "$file" ]] && continue

            if ! grep -q 'sops:' "$file" 2>/dev/null && \
               ! grep -q '"sops"' "$file" 2>/dev/null; then
              echo "::error file=${file}::Secret file is NOT SOPS-encrypted"
              FINDING_COUNT=$((FINDING_COUNT + 1))
            fi
          done <<< "$SECRET_FILES"

          echo "count=${FINDING_COUNT}" >> "$GITHUB_OUTPUT"

      # ── Aggregate and report ───────────────────────────────────────────
      - name: Aggregate results
        id: total
        run: |
          set -euo pipefail
          GITLEAKS=${{ steps.gitleaks-count.outputs.count }}
          PATTERNS=${{ steps.patterns.outputs.count }}
          SOPS=${{ steps.sops.outputs.count }}
          TOTAL=$((GITLEAKS + PATTERNS + SOPS))
          echo "count=${TOTAL}" >> "$GITHUB_OUTPUT"

          echo "## Secret Scan Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$TOTAL" -eq 0 ]]; then
            echo "No secrets detected in this PR." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Scanner | Findings |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---------|----------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Gitleaks | ${GITLEAKS} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Pattern Match | ${PATTERNS} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| SOPS Validation | ${SOPS} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Total** | **${TOTAL}** |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload SARIF
        if: always() && hashFiles('gitleaks-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks-report.sarif
          category: gitleaks-pr

      - name: Comment on PR
        if: steps.total.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const total = ${{ steps.total.outputs.count }};
            const body = `## Secret Scan Failed

            **${total} potential secret(s) detected in this PR.**

            | Scanner | Findings |
            |---------|----------|
            | Gitleaks | ${{ steps.gitleaks-count.outputs.count }} |
            | Pattern Match | ${{ steps.patterns.outputs.count }} |
            | SOPS Validation | ${{ steps.sops.outputs.count }} |

            Please review the findings and remove any leaked secrets before merging.
            If these are false positives, add them to \`.gitleaksignore\`.

            > This PR is blocked until all secret findings are resolved.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Block merge on findings
        if: steps.total.outputs.count != '0'
        run: |
          echo "::error::Found ${{ steps.total.outputs.count }} potential secret(s). PR merge blocked."
          exit 1
