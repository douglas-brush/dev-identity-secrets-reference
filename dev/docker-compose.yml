# Local development stack for developer identity & secrets management patterns.
# Start: docker compose up -d
# Bootstrap: docker compose exec vault /vault/scripts/setup.sh

services:
  vault:
    image: hashicorp/vault:1.15
    container_name: dev-vault
    cap_add:
      - IPC_LOCK
    ports:
      - "${VAULT_PORT:-8200}:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "${VAULT_DEV_ROOT_TOKEN:-dev-root-token}"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://127.0.0.1:8200"
      VAULT_API_ADDR: "http://127.0.0.1:8200"
      VAULT_LOG_LEVEL: "${VAULT_LOG_LEVEL:-info}"
    volumes:
      - vault-data:/vault/file
      - ./vault/config.hcl:/vault/config/local.hcl:ro
      - ./vault/setup.sh:/vault/scripts/setup.sh:ro
      - ../platform/vault/policies:/vault/policies:ro
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - dev-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: dev-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: "${POSTGRES_DB:-demo}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-demo}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - dev-net
    restart: unless-stopped

volumes:
  vault-data:
    driver: local
  postgres-data:
    driver: local

networks:
  dev-net:
    driver: bridge
